<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シンキングツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0ece0;
    --card: #ffffff;
    --border: #c8c0b0;
    --accent: #cc2222;
    --accent2: #e85010;
    --node-fill: #ffffff;
    --node-border: #b0a898;
    --head-fill: #e8e0d0;
    --line: #b0a898;
    --text: #2a2520;
    --sub: #6a6258;
    --orange: #f07020;
    --green: #20a060;
    --shadow: rgba(0,0,0,0.10);
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HOME SCREEN ===== */
  #home-screen {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  .home-title {
    font-size: 2.4rem;
    font-weight: 900;
    text-align: center;
    letter-spacing: 0.08em;
    margin-bottom: 28px;
    color: var(--text);
  }

  .btn-new {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #cc2222 0%, #e84040 100%);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 18px 30px 18px 44px;
    font-size: 1.5rem;
    font-weight: 900;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 18px rgba(200,30,30,0.25);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .btn-new:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(200,30,30,0.35); }
  .btn-new .furigana { font-size: 0.55rem; font-weight: 400; letter-spacing: 0.12em; display: block; }
  .btn-new .plus {
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; font-weight: 300;
  }

  .saved-section {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    margin-top: 28px;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .saved-title {
    font-size: 1.05rem;
    font-weight: 800;
    margin-bottom: 18px;
  }
  .saved-grid {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }
  .saved-card {
    width: 200px;
    cursor: pointer;
  }
  .saved-card-label { font-size: 0.85rem; font-weight: 700; margin-bottom: 2px; }
  .saved-card-date { font-size: 0.72rem; color: var(--sub); margin-bottom: 8px; }
  .saved-card-thumb {
    background: #f8f5ee;
    border: 1px solid var(--border);
    border-radius: 10px;
    height: 90px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .saved-card:hover .saved-card-thumb { border-color: var(--accent); }
  .saved-card-thumb svg { opacity: 0.35; }
  .saved-card-del {
    position: absolute; bottom: 6px; right: 6px;
    background: none; border: none; cursor: pointer;
    color: #aaa; font-size: 1rem;
    transition: color 0.12s;
  }
  .saved-card-del:hover { color: var(--accent); }

  /* ===== TOOL SELECT MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(60,50,40,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #f5f2ec;
    border-radius: 18px;
    padding: 32px 28px;
    width: 700px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.22);
    position: relative;
  }
  .modal-close {
    position: absolute; top: 18px; left: 18px;
    font-size: 1.4rem; background: none; border: none; cursor: pointer; color: var(--text);
  }
  .modal-title {
    font-size: 1.25rem; font-weight: 800;
    text-align: center; margin-bottom: 28px;
  }
  .tool-grid {
    display: flex; flex-wrap: wrap; gap: 18px; justify-content: center;
  }
  .tool-card {
    width: 180px; cursor: pointer;
    background: #e8e3d8;
    border-radius: 14px;
    padding: 16px 12px 12px;
    text-align: center;
    border: 2px solid transparent;
    transition: border-color 0.14s, background 0.14s;
  }
  .tool-card:hover { border-color: var(--accent); background: #ddd8cc; }
  .tool-card-icon {
    height: 80px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
  }
  .tool-card-icon svg { opacity: 0.6; }
  .tool-card-name { font-size: 0.9rem; font-weight: 700; }
  .tool-card-sub { font-size: 0.72rem; color: var(--sub); }

  /* ===== EDITOR ===== */
  #editor-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 200;
  }
  #editor-screen.open { display: flex; }

  .editor-toolbar {
    background: #4a4540;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 52px;
    gap: 10px;
    flex-shrink: 0;
  }
  .toolbar-btn {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 0.8rem;
    font-family: inherit; transition: background 0.12s;
  }
  .toolbar-btn:hover { background: rgba(255,255,255,0.28); }
  .editor-title-input {
    flex: 1; background: none; border: none; color: #fff;
    font-size: 1rem; font-weight: 700; font-family: inherit;
    outline: none; text-align: center;
  }
  .zoom-controls { display: flex; gap: 6px; align-items: center; }
  .zoom-btn {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    border-radius: 20px; padding: 5px 14px; cursor: pointer; font-size: 0.85rem;
    font-family: inherit;
  }
  .close-editor {
    background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer;
    padding: 4px 8px;
  }

  .editor-canvas-wrap {
    flex: 1; overflow: auto; position: relative;
  }
  #editor-canvas {
    position: relative;
    width: 2400px;
    height: 1600px;
    transform-origin: 0 0;
  }

  /* SVG lines layer */
  #lines-svg {
    position: absolute; inset: 0; pointer-events: none;
    width: 100%; height: 100%;
  }

  /* ===== NODES ===== */
  .node {
    position: absolute;
    cursor: pointer;
    user-select: none;
  }
  .node-inner {
    border: 2.5px solid var(--node-border);
    background: var(--node-fill);
    border-radius: 10px;
    min-width: 110px;
    min-height: 44px;
    display: flex; align-items: center; justify-content: center;
    padding: 8px 12px;
    font-size: 0.9rem;
    text-align: center;
    transition: border-color 0.12s, box-shadow 0.12s;
    word-break: break-all;
    line-height: 1.4;
  }
  .node.selected .node-inner {
    border-color: var(--orange);
    box-shadow: 0 0 0 2px var(--orange);
  }
  .node.center-node .node-inner {
    border-radius: 50%;
    width: 110px; height: 110px;
    font-weight: 800;
    background: var(--head-fill);
    font-size: 1rem;
  }
  .node.head-node .node-inner {
    border-radius: 10px 50px 50px 10px;
    background: var(--head-fill);
    font-weight: 700;
    min-width: 130px;
  }
  /* fishbone specific */
  .node.fish-head .node-inner {
    border-radius: 50% 10px 10px 50%;
    background: var(--head-fill);
    font-weight: 800;
    width: 90px; height: 90px;
  }

  .node-actions {
    display: none;
    position: absolute;
    bottom: -34px; right: 0;
    gap: 4px;
  }
  .node.selected .node-actions { display: flex; }
  .node-act-btn {
    width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
  }
  .btn-add-child { background: var(--green); color: #fff; font-size: 1.1rem; }
  .btn-del-node { background: #ddd; color: #666; font-size: 0.8rem; }

  /* ===== TEXT EDIT MODAL ===== */
  .text-modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(60,50,40,0.55);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }
  .text-modal-overlay.open { display: flex; }
  .text-modal {
    background: #f0ece4;
    border-radius: 16px;
    padding: 28px 24px 22px;
    width: 560px; max-width: 95vw;
    box-shadow: 0 8px 40px rgba(0,0,0,0.22);
  }
  .text-modal-row { display: flex; align-items: center; margin-bottom: 18px; gap: 12px; }
  .text-modal-label { font-size: 0.85rem; font-weight: 700; min-width: 80px; }
  .toggle-group { display: flex; gap: 6px; }
  .toggle-btn {
    border: 1.5px solid #bbb; background: #fff; border-radius: 8px;
    padding: 7px 18px; cursor: pointer; font-size: 0.85rem; font-family: inherit;
    transition: all 0.12s;
  }
  .toggle-btn.active { background: #2a2520; color: #fff; border-color: #2a2520; }
  .font-size-slider { flex: 1; accent-color: var(--accent); }
  .text-modal-textarea {
    width: 100%; height: 130px; border: 1.5px solid #bbb; border-radius: 10px;
    padding: 12px; font-size: 0.95rem; font-family: inherit; resize: vertical;
    background: #fff;
  }
  .text-modal-footer { display: flex; justify-content: space-between; margin-top: 16px; }
  .btn-confirm {
    background: #2a2520; color: #fff; border: none; border-radius: 10px;
    padding: 10px 30px; font-size: 0.95rem; font-family: inherit; cursor: pointer;
    font-weight: 700;
  }
  .btn-cancel {
    background: #fff; color: #2a2520; border: 1.5px solid #bbb; border-radius: 10px;
    padding: 10px 30px; font-size: 0.95rem; font-family: inherit; cursor: pointer;
  }
  .color-btn {
    border: 1.5px solid #bbb; background: #fff; border-radius: 20px;
    padding: 6px 16px; cursor: pointer; font-size: 0.82rem; font-family: inherit;
  }

  .empty-saved { color: var(--sub); font-size: 0.9rem; padding: 10px 0; }

  /* bottom buttons */
  .editor-bottom-btns {
    position: fixed;
    left: 0; bottom: 0;
    display: flex; flex-direction: column; gap: 6px;
    padding: 12px;
    z-index: 210;
  }
  .bottom-btn {
    background: rgba(70,60,50,0.85); color: #fff; border: none;
    border-radius: 10px; padding: 10px 18px; cursor: pointer;
    font-size: 0.85rem; font-family: inherit; font-weight: 700;
    backdrop-filter: blur(4px);
  }
</style>
</head>
<body>

<!-- ========== HOME ========== -->
<div id="home-screen">
  <h1 class="home-title">シンキングツール</h1>
  <button class="btn-new" onclick="openToolSelect()">
    <span>
      <span class="furigana">あたら　　つく</span>
      新しく作る
    </span>
    <span class="plus">＋</span>
  </button>

  <div class="saved-section">
    <div class="saved-title">
      <ruby>以前<rt>いぜん</rt></ruby>に<ruby>作成<rt>さくせい</rt></ruby>したシンキングツール　
      <ruby>更新<rt>こうしん</rt></ruby><ruby>順<rt>じゅん</rt></ruby>
    </div>
    <div id="saved-grid" class="saved-grid">
      <p class="empty-saved">まだ作成したツールはありません</p>
    </div>
  </div>
</div>

<!-- ========== TOOL SELECT MODAL ========== -->
<div class="modal-overlay" id="tool-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeToolSelect()">✕</button>
    <div class="modal-title">
      <ruby>使用<rt>しよう</rt></ruby>するツールを<ruby>選択<rt>せんたく</rt></ruby>してください
    </div>
    <div class="tool-grid">
      <div class="tool-card" onclick="createNew('webbing')">
        <div class="tool-card-icon">
          <svg width="90" height="70" viewBox="0 0 90 70">
            <circle cx="45" cy="35" r="16" fill="none" stroke="#888" stroke-width="2.5"/>
            <rect x="5" y="5" width="22" height="14" rx="4" fill="none" stroke="#888" stroke-width="2"/>
            <rect x="63" y="5" width="22" height="14" rx="4" fill="none" stroke="#888" stroke-width="2"/>
            <rect x="5" y="51" width="22" height="14" rx="4" fill="none" stroke="#888" stroke-width="2"/>
            <rect x="63" y="51" width="22" height="14" rx="4" fill="none" stroke="#888" stroke-width="2"/>
            <line x1="29" y1="35" x2="16" y2="12" stroke="#888" stroke-width="1.5"/>
            <line x1="61" y1="35" x2="74" y2="12" stroke="#888" stroke-width="1.5"/>
            <line x1="29" y1="40" x2="16" y2="58" stroke="#888" stroke-width="1.5"/>
            <line x1="61" y1="40" x2="74" y2="58" stroke="#888" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="tool-card-name">ウェビングマップ</div>
      </div>

      <div class="tool-card" onclick="createNew('jellyfish')">
        <div class="tool-card-icon">
          <svg width="90" height="80" viewBox="0 0 90 80">
            <path d="M20,40 Q45,10 70,40" fill="#c8c0b0" stroke="#888" stroke-width="2"/>
            <line x1="28" y1="40" x2="20" y2="62" stroke="#888" stroke-width="2"/>
            <line x1="45" y1="40" x2="45" y2="62" stroke="#888" stroke-width="2"/>
            <line x1="62" y1="40" x2="70" y2="62" stroke="#888" stroke-width="2"/>
            <rect x="8" y="62" width="22" height="14" rx="4" fill="none" stroke="#888" stroke-width="2"/>
            <rect x="34" y="62" width="22" height="14" rx="4" fill="none" stroke="#888" stroke-width="2"/>
            <rect x="60" y="62" width="22" height="14" rx="4" fill="none" stroke="#888" stroke-width="2"/>
          </svg>
        </div>
        <div class="tool-card-name">クラゲチャート</div>
      </div>

      <div class="tool-card" onclick="createNew('fishbone')">
        <div class="tool-card-icon">
          <svg width="100" height="70" viewBox="0 0 100 70">
            <line x1="10" y1="35" x2="90" y2="35" stroke="#888" stroke-width="2.5"/>
            <circle cx="90" cy="35" r="8" fill="none" stroke="#888" stroke-width="2"/>
            <line x1="30" y1="35" x2="20" y2="16" stroke="#888" stroke-width="1.8"/>
            <line x1="50" y1="35" x2="40" y2="16" stroke="#888" stroke-width="1.8"/>
            <line x1="70" y1="35" x2="60" y2="16" stroke="#888" stroke-width="1.8"/>
            <line x1="30" y1="35" x2="20" y2="54" stroke="#888" stroke-width="1.8"/>
            <line x1="50" y1="35" x2="40" y2="54" stroke="#888" stroke-width="1.8"/>
            <line x1="70" y1="35" x2="60" y2="54" stroke="#888" stroke-width="1.8"/>
          </svg>
        </div>
        <div class="tool-card-name">フィッシュボーン</div>
      </div>

      <div class="tool-card" onclick="createNew('diamond4')">
        <div class="tool-card-icon">
          <svg width="90" height="75" viewBox="0 0 90 75">
            <rect x="30" y="4" width="30" height="16" rx="4" fill="none" stroke="#888" stroke-width="2"/>
            <rect x="5" y="30" width="30" height="16" rx="4" fill="none" stroke="#888" stroke-width="2"/>
            <rect x="55" y="30" width="30" height="16" rx="4" fill="none" stroke="#888" stroke-width="2"/>
            <rect x="30" y="56" width="30" height="16" rx="4" fill="none" stroke="#888" stroke-width="2"/>
          </svg>
        </div>
        <div class="tool-card-name">ダイヤモンドランキング<br><span class="tool-card-sub"><ruby>わく<rt></rt></ruby>4枠</span></div>
      </div>

      <div class="tool-card" onclick="createNew('diamond9')">
        <div class="tool-card-icon">
          <svg width="100" height="80" viewBox="0 0 100 80">
            <rect x="36" y="2" width="28" height="14" rx="3" fill="none" stroke="#888" stroke-width="1.8"/>
            <rect x="14" y="22" width="28" height="14" rx="3" fill="none" stroke="#888" stroke-width="1.8"/>
            <rect x="58" y="22" width="28" height="14" rx="3" fill="none" stroke="#888" stroke-width="1.8"/>
            <rect x="14" y="42" width="28" height="14" rx="3" fill="none" stroke="#888" stroke-width="1.8"/>
            <rect x="58" y="42" width="28" height="14" rx="3" fill="none" stroke="#888" stroke-width="1.8"/>
            <rect x="36" y="62" width="28" height="14" rx="3" fill="none" stroke="#888" stroke-width="1.8"/>
          </svg>
        </div>
        <div class="tool-card-name">ダイヤモンドランキング<br><span class="tool-card-sub">9枠</span></div>
      </div>

      <div class="tool-card" onclick="createNew('mindmap')">
        <div class="tool-card-icon">
          <svg width="90" height="70" viewBox="0 0 90 70">
            <circle cx="30" cy="35" r="14" fill="none" stroke="#888" stroke-width="2.5"/>
            <rect x="52" y="10" width="32" height="12" rx="4" fill="none" stroke="#888" stroke-width="1.8"/>
            <rect x="52" y="28" width="32" height="12" rx="4" fill="none" stroke="#888" stroke-width="1.8"/>
            <rect x="52" y="46" width="32" height="12" rx="4" fill="none" stroke="#888" stroke-width="1.8"/>
            <line x1="44" y1="30" x2="52" y2="16" stroke="#888" stroke-width="1.5"/>
            <line x1="44" y1="35" x2="52" y2="34" stroke="#888" stroke-width="1.5"/>
            <line x1="44" y1="40" x2="52" y2="52" stroke="#888" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="tool-card-name">マインドマップ</div>
      </div>
    </div>
  </div>
</div>

<!-- ========== EDITOR ========== -->
<div id="editor-screen">
  <div class="editor-toolbar">
    <button class="toolbar-btn" onclick="closeEditor()">← ツールバーをしまう</button>
    <input id="editor-title" class="editor-title-input" value="無題" />
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoom(-0.15)">🔍－</button>
      <button class="zoom-btn" onclick="resetZoom()">もどす</button>
      <button class="zoom-btn" onclick="zoom(0.15)">🔍＋</button>
    </div>
    <button class="close-editor" onclick="closeEditor()">✕</button>
  </div>

  <div class="editor-canvas-wrap" id="canvas-wrap">
    <div id="editor-canvas">
      <svg id="lines-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <div class="editor-bottom-btns">
    <button class="bottom-btn" onclick="saveWork()">きろく</button>
    <button class="bottom-btn" onclick="openToolSelectFromEditor()">どうぐ</button>
  </div>
</div>

<!-- ========== TEXT EDIT MODAL ========== -->
<div class="text-modal-overlay" id="text-modal">
  <div class="text-modal">
    <div class="text-modal-row">
      <span class="text-modal-label"><ruby>向き<rt>むき</rt></ruby></span>
      <div class="toggle-group">
        <button class="toggle-btn" id="dir-tate" onclick="setDir('tate')"><ruby>たて書き<rt></rt></ruby></button>
        <button class="toggle-btn active" id="dir-yoko" onclick="setDir('yoko')"><ruby>よこ書き<rt></rt></ruby></button>
      </div>
    </div>
    <div class="text-modal-row">
      <span class="text-modal-label"><ruby>文字<rt>もじ</rt></ruby>の<ruby>大きさ<rt>おおきさ</rt></ruby></span>
      <input type="range" class="font-size-slider" id="font-size-slider" min="10" max="28" value="14">
    </div>
    <div class="text-modal-row">
      <span class="text-modal-label"><ruby>文字<rt>もじ</rt></ruby>の<ruby>太さ<rt>ふとさ</rt></ruby></span>
      <div class="toggle-group">
        <button class="toggle-btn active" id="weight-normal" onclick="setWeight('normal')">ふつう</button>
        <button class="toggle-btn" id="weight-bold" onclick="setWeight('bold')"><ruby>太字<rt>ふとじ</rt></ruby></button>
      </div>
    </div>
    <div class="text-modal-row">
      <span class="text-modal-label"><ruby>文字<rt>もじ</rt></ruby>の<ruby>色<rt>いろ</rt></ruby></span>
      <input type="color" id="text-color" value="#2a2520" style="width:36px;height:28px;border:none;background:none;cursor:pointer">
      <button class="color-btn" onclick="document.getElementById('text-color').click()"><ruby>色変更<rt>いろへんこう</rt></ruby></button>
    </div>
    <div class="text-modal-row">
      <span class="text-modal-label"><ruby>背景<rt>はいけい</rt></ruby>の<ruby>色<rt>いろ</rt></ruby></span>
      <input type="color" id="bg-color" value="#ffffff" style="width:36px;height:28px;border:none;background:none;cursor:pointer">
      <button class="color-btn" onclick="document.getElementById('bg-color').click()"><ruby>色変更<rt>いろへんこう</rt></ruby></button>
    </div>
    <textarea class="text-modal-textarea" id="node-text-input" placeholder="テキストを入力してください"></textarea>
    <div class="text-modal-footer">
      <button class="btn-confirm" onclick="confirmNodeText()">きめる</button>
      <button class="btn-cancel" onclick="cancelNodeText()">やめる</button>
    </div>
  </div>
</div>

<script>
// ====================================
// STATE
// ====================================
let nodes = [];
let edges = [];
let selectedNodeId = null;
let editingNodeId = null;
let currentTool = null;
let zoomLevel = 1;
let idCounter = 1;
let savedProjects = [];

function uid() { return 'n' + (idCounter++); }

// ====================================
// HOME / SAVED
// ====================================
function renderSaved() {
  const grid = document.getElementById('saved-grid');
  const projects = getSavedProjects();
  if (!projects.length) {
    grid.innerHTML = '<p class="empty-saved">まだ作成したツールはありません</p>';
    return;
  }
  grid.innerHTML = projects.slice().reverse().map(p => `
    <div class="saved-card" onclick="loadProject('${p.id}')">
      <div class="saved-card-label">${escHtml(p.title)}</div>
      <div class="saved-card-date">${p.date}更新</div>
      <div class="saved-card-thumb">
        ${thumbSvg(p.tool)}
        <button class="saved-card-del" onclick="event.stopPropagation();deleteProject('${p.id}')">🗑</button>
      </div>
    </div>
  `).join('');
}

function getSavedProjects() {
  try { return JSON.parse(localStorage.getItem('thinking_projects') || '[]'); } catch { return []; }
}
function setSavedProjects(arr) {
  localStorage.setItem('thinking_projects', JSON.stringify(arr));
}
function deleteProject(id) {
  const arr = getSavedProjects().filter(p => p.id !== id);
  setSavedProjects(arr);
  renderSaved();
}
function loadProject(id) {
  const p = getSavedProjects().find(x => x.id === id);
  if (!p) return;
  currentTool = p.tool;
  nodes = p.nodes || [];
  edges = p.edges || [];
  idCounter = p.idCounter || 100;
  document.getElementById('editor-title').value = p.title || '無題';
  openEditor();
  renderCanvas();
}

function saveWork() {
  const title = document.getElementById('editor-title').value || '無題';
  const now = new Date();
  const date = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  let arr = getSavedProjects();
  const existing = arr.find(p => p.id === currentProjectId);
  if (existing) {
    existing.title = title;
    existing.date = date;
    existing.nodes = nodes;
    existing.edges = edges;
    existing.idCounter = idCounter;
    existing.tool = currentTool;
  } else {
    arr.push({ id: currentProjectId, title, date, nodes, edges, idCounter, tool: currentTool });
  }
  setSavedProjects(arr);
  const btn = document.querySelector('.bottom-btn');
  btn.textContent = '保存しました！';
  setTimeout(() => btn.textContent = 'きろく', 1200);
}

let currentProjectId = null;

// ====================================
// TOOL SELECT
// ====================================
function openToolSelect() {
  document.getElementById('tool-modal').classList.add('open');
}
function closeToolSelect() {
  document.getElementById('tool-modal').classList.remove('open');
}
function openToolSelectFromEditor() {
  closeEditor();
  openToolSelect();
}

function createNew(tool) {
  closeToolSelect();
  currentTool = tool;
  currentProjectId = 'proj_' + Date.now();
  nodes = [];
  edges = [];
  idCounter = 1;
  document.getElementById('editor-title').value = toolName(tool);
  buildInitialLayout(tool);
  openEditor();
  renderCanvas();
}

function toolName(t) {
  return { webbing:'ウェビングマップ', jellyfish:'クラゲチャート', fishbone:'フィッシュボーン',
           diamond4:'ダイヤモンドランキング4枠', diamond9:'ダイヤモンドランキング9枠', mindmap:'マインドマップ' }[t] || t;
}

// ====================================
// INITIAL LAYOUTS
// ====================================
function buildInitialLayout(tool) {
  if (tool === 'webbing') {
    const cx = 600, cy = 400;
    const center = makeNode(cx, cy, '', 'center');
    const dirs = [[-260,-180],[-260,60],[260,-180],[260,60],[-30,-260],[-30,220]];
    dirs.forEach(([dx,dy]) => {
      const n = makeNode(cx+dx, cy+dy, '', 'branch');
      edges.push({ from: center.id, to: n.id });
    });
  } else if (tool === 'jellyfish') {
    const cx = 600, cy = 240;
    const top = makeNode(cx-55, cy, '', 'head-semi');
    const xs = [cx-350, cx-160, cx+60, cx+250, cx+440];
    const dy = 260;
    xs.forEach(x => {
      const n = makeNode(x, cy + dy, '', 'branch');
      edges.push({ from: top.id, to: n.id });
    });
  } else if (tool === 'fishbone') {
    const cx = 900, cy = 380;
    const head = makeNode(cx-30, cy-40, '', 'fish-head');
    const spine_x = cx - 620;
    edges.push({ from: head.id, to: head.id, type: 'spine', x1: spine_x, y1: cy+10, x2: cx-70, y2: cy+10 });
    const bones = [
      [spine_x+90, cy-150], [spine_x+240, cy-150], [spine_x+390, cy-150], [spine_x+540, cy-150],
      [spine_x+90, cy+160], [spine_x+240, cy+160], [spine_x+390, cy+160], [spine_x+540, cy+160]
    ];
    bones.forEach(([bx, by]) => {
      const n = makeNode(bx, by, '', 'branch');
      edges.push({ from: head.id, to: n.id });
    });
  } else if (tool === 'diamond4') {
    const cx = 600, cy = 400;
    const pos = [[cx,cy-200],[cx-260,cy],[cx+260,cy],[cx,cy+200]];
    pos.forEach(([x,y]) => makeNode(x,y,'','branch'));
  } else if (tool === 'diamond9') {
    const cx = 600, cy = 400;
    const pos = [
      [cx,cy-300],
      [cx-240,cy-150],[cx+240,cy-150],
      [cx-240,cy],[cx,cy],[cx+240,cy],
      [cx-240,cy+150],[cx+240,cy+150],
      [cx,cy+300]
    ];
    pos.forEach(([x,y],i) => makeNode(x,y,i===4?'１番':'','branch'));
  } else if (tool === 'mindmap') {
    const cx = 280, cy = 400;
    const center = makeNode(cx, cy, '', 'center');
    const ys = [cy-240, cy-120, cy, cy+120, cy+240];
    ys.forEach(y => {
      const n = makeNode(cx+340, y, '', 'branch');
      edges.push({ from: center.id, to: n.id });
    });
  }
}

function makeNode(x, y, text='', type='branch') {
  const n = { id: uid(), x, y, text, type, fontSize: 14, fontWeight: 'normal', color: '#2a2520', bg: '#ffffff', dir: 'yoko' };
  nodes.push(n);
  return n;
}

// ====================================
// EDITOR OPEN/CLOSE
// ====================================
function openEditor() {
  document.getElementById('editor-screen').classList.add('open');
  document.getElementById('home-screen').style.display = 'none';
  zoomLevel = 1;
  applyZoom();
}
function closeEditor() {
  document.getElementById('editor-screen').classList.remove('open');
  document.getElementById('home-screen').style.display = 'block';
  renderSaved();
  selectedNodeId = null;
}

// ====================================
// ZOOM
// ====================================
function zoom(delta) {
  zoomLevel = Math.max(0.3, Math.min(2.5, zoomLevel + delta));
  applyZoom();
}
function resetZoom() { zoomLevel = 1; applyZoom(); }
function applyZoom() {
  document.getElementById('editor-canvas').style.transform = `scale(${zoomLevel})`;
}

// ====================================
// RENDER CANVAS
// ====================================
function renderCanvas() {
  const canvas = document.getElementById('editor-canvas');
  // remove old nodes
  canvas.querySelectorAll('.node').forEach(el => el.remove());

  // draw nodes
  nodes.forEach(n => {
    const el = createNodeEl(n);
    canvas.appendChild(el);
  });

  drawLines();
}

function createNodeEl(n) {
  const div = document.createElement('div');
  div.className = 'node' + (n.type === 'center' ? ' center-node' : '') + (n.type === 'head-semi' ? ' head-node' : '') + (n.type === 'fish-head' ? ' fish-head' : '');
  div.id = 'node-' + n.id;
  div.style.left = n.x + 'px';
  div.style.top = n.y + 'px';
  div.style.position = 'absolute';

  const inner = document.createElement('div');
  inner.className = 'node-inner';
  inner.style.fontSize = (n.fontSize || 14) + 'px';
  inner.style.fontWeight = n.fontWeight || 'normal';
  inner.style.color = n.color || '#2a2520';
  inner.style.background = n.bg || '#ffffff';
  if (n.dir === 'tate') inner.style.writingMode = 'vertical-rl';
  if (n.type === 'head-semi') {
    inner.style.borderRadius = '50% 10px 10px 50%';
    inner.style.background = '#e8e0d0';
    inner.style.minWidth = '80px';
    inner.style.height = '180px';
    inner.style.alignItems = 'center';
    inner.style.justifyContent = 'center';
  }
  inner.textContent = n.text || '';

  const actions = document.createElement('div');
  actions.className = 'node-actions';

  const addBtn = document.createElement('button');
  addBtn.className = 'node-act-btn btn-add-child';
  addBtn.textContent = '＋';
  addBtn.title = '子ノードを追加';
  addBtn.onclick = (e) => { e.stopPropagation(); addChild(n.id); };

  const delBtn = document.createElement('button');
  delBtn.className = 'node-act-btn btn-del-node';
  delBtn.textContent = '🗑';
  delBtn.title = 'ノードを削除';
  delBtn.onclick = (e) => { e.stopPropagation(); deleteNode(n.id); };

  actions.appendChild(addBtn);
  actions.appendChild(delBtn);

  div.appendChild(inner);
  div.appendChild(actions);

  div.addEventListener('click', (e) => {
    e.stopPropagation();
    selectNode(n.id);
  });
  div.addEventListener('dblclick', (e) => {
    e.stopPropagation();
    openTextModal(n.id);
  });

  makeDraggable(div, n);
  return div;
}

// ====================================
// DRAG
// ====================================
function makeDraggable(el, n) {
  let startX, startY, startNX, startNY, dragging = false;
  el.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON') return;
    startX = e.clientX; startY = e.clientY;
    startNX = n.x; startNY = n.y;
    dragging = true;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = (e.clientX - startX) / zoomLevel;
    const dy = (e.clientY - startY) / zoomLevel;
    n.x = startNX + dx;
    n.y = startNY + dy;
    el.style.left = n.x + 'px';
    el.style.top = n.y + 'px';
    drawLines();
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  // touch
  el.addEventListener('touchstart', e => {
    if (e.target.tagName === 'BUTTON') return;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    startNX = n.x; startNY = n.y;
    dragging = true;
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const t = e.touches[0];
    const dx = (t.clientX - startX) / zoomLevel;
    const dy = (t.clientY - startY) / zoomLevel;
    n.x = startNX + dx;
    n.y = startNY + dy;
    el.style.left = n.x + 'px';
    el.style.top = n.y + 'px';
    drawLines();
  }, { passive: true });
  document.addEventListener('touchend', () => { dragging = false; });
}

// ====================================
// LINES
// ====================================
function nodeCenter(n) {
  const el = document.getElementById('node-' + n.id);
  if (!el) return { x: n.x + 65, y: n.y + 30 };
  const w = el.offsetWidth || 130;
  const h = el.offsetHeight || 60;
  return { x: n.x + w/2, y: n.y + h/2 };
}

function drawLines() {
  const svg = document.getElementById('lines-svg');
  svg.innerHTML = '';

  edges.forEach(e => {
    if (e.type === 'spine') {
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', e.x1); line.setAttribute('y1', e.y1);
      line.setAttribute('x2', e.x2); line.setAttribute('y2', e.y2);
      line.setAttribute('stroke', '#b0a898'); line.setAttribute('stroke-width', '3');
      svg.appendChild(line);
      return;
    }
    const from = nodes.find(n => n.id === e.from);
    const to = nodes.find(n => n.id === e.to);
    if (!from || !to || from === to) return;
    const fc = nodeCenter(from);
    const tc = nodeCenter(to);
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    const mx = (fc.x + tc.x) / 2;
    const d = `M ${fc.x} ${fc.y} Q ${mx} ${fc.y} ${mx} ${(fc.y+tc.y)/2} Q ${mx} ${tc.y} ${tc.x} ${tc.y}`;
    path.setAttribute('d', d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','#b0a898');
    path.setAttribute('stroke-width','2');
    svg.appendChild(path);
  });
}

// ====================================
// SELECT / ADD / DELETE
// ====================================
function selectNode(id) {
  selectedNodeId = id;
  document.querySelectorAll('.node').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('node-' + id);
  if (el) el.classList.add('selected');
}

document.addEventListener('click', () => {
  selectedNodeId = null;
  document.querySelectorAll('.node').forEach(el => el.classList.remove('selected'));
});

function addChild(parentId) {
  const parent = nodes.find(n => n.id === parentId);
  if (!parent) return;
  const child = makeNode(parent.x + 220, parent.y + 60, '', 'branch');
  edges.push({ from: parentId, to: child.id });
  const canvas = document.getElementById('editor-canvas');
  canvas.appendChild(createNodeEl(child));
  drawLines();
  selectNode(child.id);
}

function deleteNode(id) {
  if (nodes.length <= 1) return;
  nodes = nodes.filter(n => n.id !== id);
  edges = edges.filter(e => e.from !== id && e.to !== id);
  const el = document.getElementById('node-' + id);
  if (el) el.remove();
  drawLines();
}

// ====================================
// TEXT MODAL
// ====================================
function openTextModal(nodeId) {
  editingNodeId = nodeId;
  const n = nodes.find(x => x.id === nodeId);
  if (!n) return;
  document.getElementById('node-text-input').value = n.text || '';
  document.getElementById('font-size-slider').value = n.fontSize || 14;
  document.getElementById('text-color').value = n.color || '#2a2520';
  document.getElementById('bg-color').value = n.bg || '#ffffff';
  setDir(n.dir || 'yoko');
  setWeight(n.fontWeight || 'normal');
  document.getElementById('text-modal').classList.add('open');
  setTimeout(() => document.getElementById('node-text-input').focus(), 100);
}

function confirmNodeText() {
  const n = nodes.find(x => x.id === editingNodeId);
  if (!n) { cancelNodeText(); return; }
  n.text = document.getElementById('node-text-input').value;
  n.fontSize = parseInt(document.getElementById('font-size-slider').value);
  n.color = document.getElementById('text-color').value;
  n.bg = document.getElementById('bg-color').value;
  cancelNodeText();
  // re-render node
  const el = document.getElementById('node-' + n.id);
  if (el) el.remove();
  const canvas = document.getElementById('editor-canvas');
  canvas.appendChild(createNodeEl(n));
  drawLines();
}

function cancelNodeText() {
  document.getElementById('text-modal').classList.remove('open');
  editingNodeId = null;
}

function setDir(d) {
  document.getElementById('dir-tate').classList.toggle('active', d === 'tate');
  document.getElementById('dir-yoko').classList.toggle('active', d === 'yoko');
  const n = nodes.find(x => x.id === editingNodeId);
  if (n) n.dir = d;
}
function setWeight(w) {
  document.getElementById('weight-normal').classList.toggle('active', w === 'normal');
  document.getElementById('weight-bold').classList.toggle('active', w === 'bold');
  const n = nodes.find(x => x.id === editingNodeId);
  if (n) n.fontWeight = w;
}

// ====================================
// UTILS
// ====================================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ====================================
// INIT
// ====================================
renderSaved();
</script>
</body>
</html>
