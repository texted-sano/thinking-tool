<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情報整理ツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f5;
  --card: #ffffff;
  --border: #222222;
  --accent: #cc0000;
  --node-border: #555555;
  --head-fill: #eeeeee;
  --text: #111111;
  --sub: #666666;
  --orange: #cc0000;
  --green: #111111;
  --shadow: rgba(0,0,0,0.08);
}

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: auto;
}

/* ===== RUBY FIX ===== */
ruby {
  display: ruby;
  ruby-position: over;
}
ruby rt {
  display: ruby-text;
  font-size: 0.33em;
  letter-spacing: -0.03em;
  color: var(--sub);
  user-select: none;
}
.btn-new:hover ruby rt {
  color: #fff;
}
.editor-toolbar rt {
  color: #aaaaaa;
}
.toolbar-btn:hover rt {
  color: #fff;
}

/* ===== HOME ===== */
#home-screen {
  max-width: 800px;
  margin: 0 auto;
  padding: 56px 32px 64px;
}

/* タイトル */
.home-title {
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: 0.12em;
  color: var(--text);
  text-align: center;
  margin-bottom: 52px;
}

/* ===== あたらしくつくる ===== */
.new-tool-section {
  margin-bottom: 64px;
}
.new-tool-label {
  font-size: 1.4rem;
  font-weight: 900;
  letter-spacing: 0.04em;
  color: var(--text);
  margin-bottom: 14px;
  padding-left: 14px;
  border-left: 5px solid var(--accent);
  line-height: 1.2;
}
.new-tool-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.new-tool-card {
  cursor: pointer;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 36px 16px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  transition: outline 0.12s;
  position: relative;
}
.new-tool-card:hover {
  border-color: transparent;
  outline: 3px solid var(--accent);
  outline-offset: -1px;
}
.new-tool-icon {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.new-tool-icon svg { opacity: 0.8; }

.new-tool-name {
  font-size: 0.85rem;
  font-weight: 800;
  color: var(--text);
  line-height: 1.5;
  letter-spacing: 0.02em;
}

/* ===== いままでにつくったもの ===== */
.saved-section { }
.saved-label {
  font-size: 1.4rem;
  font-weight: 900;
  letter-spacing: 0.04em;
  color: var(--text);
  margin-bottom: 14px;
  padding-left: 14px;
  border-left: 5px solid #0055cc;
  line-height: 1.2;
}
/* 区切り線 */
.saved-divider {
  display: none;
}
.saved-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.saved-card {
  background: #fff;
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 14px;
  transition: outline 0.12s;
}
.saved-card:hover {
  border-color: transparent;
  outline: 3px solid #0055cc;
  outline-offset: -1px;
}
.saved-card-thumb {
  width: 44px;
  height: 44px;
  border-radius: 8px;
  background: var(--bg);
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.saved-card-thumb svg {
  width: 30px;
  height: 26px;
  opacity: 1;
}
.saved-card-label {
  font-size: 1rem;
  font-weight: 800;
  color: var(--text);
  flex: 1;
  word-break: break-all;
  line-height: 1.4;
}
.saved-card-date {
  font-size: 0.78rem;
  color: var(--sub);
  white-space: nowrap;
  flex-shrink: 0;
}
.saved-card-del {
  background: none;
  border: 1.5px solid var(--border);
  cursor: pointer;
  color: var(--sub);
  font-size: 0.78rem;
  font-weight: 700;
  font-family: inherit;
  padding: 5px 12px;
  border-radius: 6px;
  flex-shrink: 0;
  transition: color 0.12s, border-color 0.12s, background 0.12s;
}
.saved-card-del:hover {
  color: var(--accent);
  border-color: var(--accent);
  background: rgba(204,0,0,0.05);
}
.empty-saved {
  font-size: 0.88rem;
  color: var(--sub);
  padding: 24px 0;
  text-align: center;
}

/* ドラッグハンドル */
.saved-card-drag-handle {
  display: flex;
  align-items: center;
  cursor: grab;
  color: var(--border);
  font-size: 1rem;
  width: 20px;
  user-select: none;
  flex-shrink: 0;
  transition: color 0.12s;
}
.saved-card-drag-handle:hover { color: var(--sub); }
.saved-card-drag-handle:active { cursor: grabbing; }
.saved-card.dragging {
  opacity: 0.5;
  background: var(--bg);
}

/* ===== TOOL SELECT MODAL ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(50,42,34,0.58); z-index: 500;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #fcfbf9; border-radius: 18px; padding: 32px 28px 28px;
  width: 600px; max-width: 95vw; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.24); position: relative;
  border: 1.5px solid var(--border);
}
.modal-close {
  position: absolute; 
  top: 16px; 
  right: 16px;
  background: #ffffff;
  border: 1.5px solid var(--accent);
  border-radius: 6px;
  cursor: pointer;
  color: var(--accent);
  font-size: 0.8rem;
  font-weight: 800;
  padding: 6px 14px;
  transition: all 0.12s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover {
  color: #ffffff;
  background: var(--accent);
  border-color: var(--accent);
}
.modal-title { font-size: 1.15rem; font-weight: 800; text-align: center; margin-bottom: 26px; }
.tool-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
.tool-card {
  width: 160px; cursor: pointer; background: #e8e3d8;
  border-radius: 14px; padding: 16px 10px 12px; text-align: center;
  border: 2px solid transparent; transition: border-color 0.14s, background 0.14s;
}
.tool-card:hover { border-color: var(--accent); background: #ddd8cc; }
.tool-card-icon { height: 76px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
.tool-card-icon svg { opacity: 0.95; }
.tool-card-name { font-size: 0.88rem; font-weight: 700; line-height: 1.4; }

/* ===== EDITOR ===== */
#editor-screen {
  display: none; flex-direction: column;
  height: 100vh; position: fixed; inset: 0;
  background: var(--bg); z-index: 200;
}
#editor-screen.open { display: flex; }

/* 上部ツールバー */
.editor-toolbar {
  background: #352e28;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 64px;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  border-bottom: 2px solid var(--accent);
  z-index: 240;
}
.editor-title-container {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 4px 12px;
  border-radius: 6px;
}
.editor-title-input {
  background: none; border: none; color: #fff;
  font-size: 0.92rem; font-weight: 800; font-family: inherit;
  outline: none; text-align: left; width: 140px;
}
.toolbar-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ツールバー用ボタン（「おわる」のデザインに統合） */
.toolbar-btn {
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.15);
  color: #fff;
  border-radius: 8px;
  width: 90px;
  height: 46px;
  cursor: pointer;
  display: inline-flex;
  align-items: center; /* 縦位置中央揃え */
  justify-content: center; /* 横位置中央揃え */
  font-family: inherit;
  font-size: 0.82rem; /* 「おわる」ボタンと同じフォントサイズ */
  font-weight: 900; /* 「おわる」ボタンと同じ太さ */
  transition: background 0.12s, border-color 0.12s;
}
.toolbar-btn:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.3);
}
.toolbar-btn:disabled {
  opacity: 0.25;
  cursor: default;
}

.close-editor-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 8px;
  width: 80px;
  height: 46px;
  font-size: 0.82rem;
  font-weight: 900;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s;
}
.close-editor-btn:hover {
  background: #c0392b;
}

.canvas-wrap { 
  flex: 1; 
  overflow: auto; 
  position: relative; 
  touch-action: none;
}
#editor-canvas {
  position: relative; 
  width: 3000px; 
  height: 2000px;
  background-color: var(--bg);
  background-image: 
    linear-gradient(rgba(208, 200, 184, 0.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(208, 200, 184, 0.4) 1px, transparent 1px);
  background-size: 40px 40px;
}
#lines-svg {
  position: absolute; inset: 0; pointer-events: none; width: 100%; height: 100%;
}

/* ===== NODES ===== */
.node {
  position: absolute; cursor: pointer; user-select: none;
  display: flex; flex-direction: column;
  touch-action: none;
}
.node-body {
  border: 2px solid var(--node-border);
  background: #ffffff; border-radius: 12px;
  min-width: 100%; min-height: 100%;
  flex: 1;
  display: flex; align-items: center; justify-content: flex-start;
  padding: 10px 14px; font-size: 0.92rem; text-align: left;
  word-break: break-all; line-height: 1.45; white-space: pre-wrap;
  box-shadow: 0 4px 12px var(--shadow);
  transition: border-color 0.12s, box-shadow 0.12s;
}
.node.selected > .node-body {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(204,0,0,0.22), 0 4px 14px var(--shadow);
}
.node.type-center .node-body {
  border-radius: 50%;
  font-weight: 800; font-size: 1rem;
  background: var(--head-fill); padding: 0;
  justify-content: center; text-align: center;
  border-style: double; border-width: 4px;
}

.node.type-jellyfish-dome > .node-body {
  border-radius: 110px 110px 14px 14px;
  background: #e6e0d5;
  border-color: var(--node-border);
  padding: 40px 16px 16px 16px;
  font-weight: 800;
  justify-content: center; text-align: center;
  border-style: double; border-width: 4px;
}

/* ===== STICKY NOTE (フセン) ===== */
.node.type-sticky > .node-body {
  border-radius: 0 !important;
  box-shadow: 3px 6px 12px rgba(0,0,0,0.08) !important;
  font-weight: 700;
  position: relative;
}

/* ===== RESIZER HANDLES ===== */
.resizer {
  position: absolute;
  background: transparent;
  z-index: 10;
}
.resizer-r  { top: 0; right: -5px; width: 10px; height: 100%; cursor: e-resize; }
.resizer-l  { top: 0; left: -5px; width: 10px; height: 100%; cursor: w-resize; }
.resizer-b  { bottom: -5px; left: 0; width: 100%; height: 10px; cursor: s-resize; }
.resizer-t  { top: -5px; left: 0; width: 100%; height: 10px; cursor: n-resize; }
.resizer-se { bottom: -6px; right: -6px; width: 14px; height: 14px; cursor: se-resize; z-index: 11; }

.node-actions {
  display: none; position: absolute;
  bottom: -34px; right: 0; gap: 5px;
}
.node.selected .node-actions { display: flex; }
.node-act-btn {
  height: 26px; border-radius: 13px; border: none; cursor: pointer;
  font-size: 0.75rem; font-family: inherit; font-weight: 700;
  padding: 0 10px; white-space: nowrap;
}
.btn-add-child { background: var(--green); color: #fff; }
.btn-del-node  { background: #c0b8b0; color: #3a3530; }
.btn-del-node.hidden { display: none; }

/* ===== TEXT MODAL ===== */
.text-modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(50,42,34,0.58); z-index: 600;
  align-items: center; justify-content: center;
}
.text-modal-overlay.open { display: flex; }
.text-modal {
  background: #fcfaf6; border-radius: 18px;
  padding: 28px 28px 22px; width: 560px; max-width: 95vw;
  box-shadow: 0 8px 40px rgba(0,0,0,0.24);
  border: 1.5px solid var(--border);
}
.tm-row { 
  display: flex; 
  align-items: center; 
  margin-bottom: 18px; 
  gap: 20px;
}
.tm-label { 
  font-size: 0.85rem; 
  font-weight: 800; 
  width: 120px;
  flex-shrink: 0; 
  line-height: 1.5; 
}
.toggle-grp { 
  display: flex; 
  gap: 8px; 
  align-items: center;
}
.tog-btn {
  border: 1.5px solid #cccccc;
  background: #ffffff; 
  color: var(--sub);
  border-radius: 8px;
  width: 96px;
  text-align: center;
  padding: 6px 0;
  cursor: pointer; 
  font-size: 0.83rem; 
  font-family: inherit;
  font-weight: 700;
  transition: all 0.12s ease;
  outline: none;
}
.tog-btn:hover {
  border-color: #111111;
}
.tog-btn.active { 
  background: #ffffff; 
  color: #111111; 
  border-color: #111111; 
  border-width: 1.5px;
  font-weight: 900; 
  box-shadow: 0 0 0 2px #111111;
  pointer-events: none; 
}の重ね押しを無効化 */
}

.fsize-slider { 
  width: 220px;
  flex-shrink: 0;
  margin-left: 2px;
  accent-color: var(--accent); 
}

.tm-textarea {
  width: 100%; height: 120px; border: 1.5px solid #cccccc; border-radius: 9px;
  padding: 10px 12px; font-size: 0.92rem; font-family: inherit; resize: vertical; background: #fff;
}
.tm-footer { display: flex; justify-content: space-between; margin-top: 14px; }
.btn-confirm {
  background: #111111; color: #fff; border: none; border-radius: 9px;
  padding: 9px 28px; font-size: 0.92rem; font-family: inherit; cursor: pointer; font-weight: 700;
}
.btn-cancel {
  background: #fff; color: #111111; border: 1.5px solid #cccccc; border-radius: 9px;
  padding: 9px 28px; font-size: 0.92rem; font-family: inherit; cursor: pointer;
}

/* ===== COLOR PALETTE ===== */
.color-palette { display: flex; gap: 8px; align-items: center; }
.palette-btn {
  width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #cccccc;
  cursor: pointer; transition: transform 0.1s, border-color 0.1s; outline: none;
}
.palette-btn:hover { transform: scale(1.15); }
.palette-btn.active { border-color: #111111; box-shadow: 0 0 0 2px #111111; }

/* save toast */
.save-toast {
  position: fixed; bottom: 20px; right: 20px;
  background: #111111; color: #fff; border-radius: 10px;
  padding: 10px 20px; font-size: 0.88rem; font-weight: 700;
  opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none;
}
.save-toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<div id="home-screen">

  <h1 class="home-title">シンキングツール</h1>

  <!-- あたらしくつくる -->
  <div class="new-tool-section">
    <div class="new-tool-label">あたらしくつくる</div>
    <div class="new-tool-grid">

      <div class="new-tool-card" onclick="createNew('webbing')">
        <div class="new-tool-icon">
          <svg width="80" height="62" viewBox="0 0 100 76">
            <circle cx="50" cy="38" r="14" fill="none" stroke="#111111" stroke-width="2.5"/>
            <rect x="2"  y="2"  width="22" height="14" rx="4" fill="none" stroke="#111111" stroke-width="2"/>
            <rect x="76" y="2"  width="22" height="14" rx="4" fill="none" stroke="#111111" stroke-width="2"/>
            <rect x="2"  y="60" width="22" height="14" rx="4" fill="none" stroke="#111111" stroke-width="2"/>
            <rect x="76" y="60" width="22" height="14" rx="4" fill="none" stroke="#111111" stroke-width="2"/>
            <line x1="36" y1="30" x2="24" y2="9"  stroke="#111111" stroke-width="1.5"/>
            <line x1="64" y1="30" x2="76" y2="9"  stroke="#111111" stroke-width="1.5"/>
            <line x1="36" y1="46" x2="24" y2="67" stroke="#111111" stroke-width="1.5"/>
            <line x1="64" y1="46" x2="76" y2="67" stroke="#111111" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="new-tool-name">タイヨウ マップ</div>
      </div>

      <div class="new-tool-card" onclick="createNew('mindmap')">
        <div class="new-tool-icon">
          <svg width="80" height="62" viewBox="0 0 100 76">
            <circle cx="28" cy="38" r="16" fill="none" stroke="#111111" stroke-width="2.5"/>
            <rect x="54" y="6"  width="38" height="13" rx="4" fill="none" stroke="#111111" stroke-width="1.8"/>
            <rect x="54" y="24" width="38" height="13" rx="4" fill="none" stroke="#111111" stroke-width="1.8"/>
            <rect x="54" y="42" width="38" height="13" rx="4" fill="none" stroke="#111111" stroke-width="1.8"/>
            <rect x="54" y="60" width="38" height="13" rx="4" fill="none" stroke="#111111" stroke-width="1.8"/>
            <line x1="44" y1="30" x2="54" y2="12" stroke="#111111" stroke-width="1.5"/>
            <line x1="44" y1="35" x2="54" y2="30" stroke="#111111" stroke-width="1.5"/>
            <line x1="44" y1="41" x2="54" y2="48" stroke="#111111" stroke-width="1.5"/>
            <line x1="44" y1="46" x2="54" y2="66" stroke="#111111" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="new-tool-name">ハリネズミ マップ</div>
      </div>

      <div class="new-tool-card" onclick="createNew('jellyfish')">
        <div class="new-tool-icon">
          <svg width="80" height="62" viewBox="0 0 100 76">
            <path d="M10,42 Q50,4 90,42" fill="#dddddd" stroke="#111111" stroke-width="2"/>
            <line x1="22" y1="42" x2="16" y2="66" stroke="#111111" stroke-width="2"/>
            <line x1="50" y1="42" x2="50" y2="66" stroke="#111111" stroke-width="2"/>
            <line x1="78" y1="42" x2="84" y2="66" stroke="#111111" stroke-width="2"/>
            <rect x="4"  y="60" width="22" height="14" rx="4" fill="none" stroke="#111111" stroke-width="1.8"/>
            <rect x="39" y="60" width="22" height="14" rx="4" fill="none" stroke="#111111" stroke-width="1.8"/>
            <rect x="74" y="60" width="22" height="14" rx="4" fill="none" stroke="#111111" stroke-width="1.8"/>
          </svg>
        </div>
        <div class="new-tool-name">クラゲ マップ</div>
      </div>

    </div>
  </div>

  <!-- いままでにつくったもの -->
  <div class="saved-section">
    <div class="saved-label">いままでにつくったもの</div>
    <div class="saved-divider"></div>
    <div id="saved-grid" class="saved-grid"></div>
  </div>

</div>

<!-- ===== EDITOR ===== -->
<div id="editor-screen">
  
  <div class="editor-toolbar">
    <div class="editor-title-container">
      <input id="editor-title" class="editor-title-input" value="無題" oninput="scheduleAutoSave()"/>
    </div>

    <div class="toolbar-actions">
      <button class="toolbar-btn" id="btn-undo" onclick="undo()" disabled>
        <span>もどる</span>
      </button>
      <button class="toolbar-btn" id="btn-redo" onclick="redo()" disabled>
        <span>すすむ</span>
      </button>
      <button class="toolbar-btn" onclick="changeZoom(+0.15)">
        <span>かくだい</span>
      </button>
      <button class="toolbar-btn" onclick="changeZoom(-0.15)">
        <span>しゅくしょう</span>
      </button>
      <button class="toolbar-btn" onclick="addStickyNote()">
        <span>ふせん</span>
      </button>
      <button class="toolbar-btn" onclick="manualSave()">
        <span>きろく</span>
      </button>
    </div>

    <button class="close-editor-btn" onclick="closeEditor()">
      <span>おわる</span>
    </button>
  </div>

  <div class="canvas-wrap" id="canvas-wrap">
    <div id="editor-canvas">
      <svg id="lines-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

</div>

<!-- ===== TEXT EDIT MODAL ===== -->
<div class="text-modal-overlay" id="text-modal">
  <div class="text-modal">
    <div class="tm-row">
      <span class="tm-label"><ruby>向<rt>む</rt></ruby>き</span>
      <div class="toggle-grp">
        <button class="tog-btn" id="dir-tate" onclick="setDir('tate')">たてがき</button>
        <button class="tog-btn active" id="dir-yoko" onclick="setDir('yoko')">よこがき</button>
      </div>
    </div>
    <div class="tm-row">
      <span class="tm-label">もじ の おおきさ</span>
      <input type="range" class="fsize-slider" id="font-size-slider" min="10" max="28" value="14">
    </div>
    <div class="tm-row">
      <span class="tm-label">もじ の ふとさ</span>
      <div class="toggle-grp">
        <button class="tog-btn active" id="weight-normal" onclick="setWeight('normal')">ふつう</button>
        <button class="tog-btn" id="weight-bold" onclick="setWeight('bold')">ふとじ</button>
      </div>
    </div>
    <div class="tm-row">
      <span class="tm-label">もじ の いろ</span>
      <div class="color-palette" id="text-color-palette"></div>
    </div>
    <div class="tm-row">
      <span class="tm-label">はいけい の いろ</span>
      <div class="color-palette" id="bg-color-palette"></div>
    </div>
    <textarea class="tm-textarea" id="node-text-input" placeholder="テキストをにゅうりょくしてください"></textarea>
    <div class="tm-footer">
      <button class="btn-confirm" onclick="confirmNodeText()">けってい</button>
      <button class="btn-cancel"  onclick="cancelNodeText()">やめる</button>
    </div>
  </div>
</div>

<div class="save-toast" id="save-toast">ほぞんしました</div>

<script>
// ============================================================
// CONFIGURATION DRIVEN SETTINGS
// ============================================================
const USER_SETTINGS = {
  CANVAS_WIDTH: 3000,
  CANVAS_HEIGHT: 2000,
  ZOOM_MIN: 0.25,
  ZOOM_MAX: 3.0,
  ZOOM_STEP: 0.15,
  AUTO_SAVE_DELAY: 1200,
  TOAST_DURATION: 1800,
  LOCAL_STORAGE_KEY: 'thinking_v3_saved',

  PALETTE_TEXT_COLORS: ['#111111', '#cc0000', '#1a5276', '#196f3d', '#b7950b', '#626567', '#ffffff'],
  PALETTE_BG_COLORS: ['#ffffff', '#fcfaf2', '#fdedec', '#ebf5fb', '#eaf2f8', '#eafaf1', '#fef9e7']
};

// ============================================================
// APP CLASS DEFINITION
// ============================================================
class ThinkingToolApp {
  constructor() {
    this.nodes = [];
    this.edges = [];
    this.currentTool = null;
    this.currentProjId = null;
    this.zoomLevel = 1.0;
    this.idCounter = 1;
    this.selectedId = null;
    this.editingId = null;

    this.undoStack = [];
    this.redoStack = [];
    this.autoSaveTimer = null;
    this.rootNodeIds = new Set();

    this.selectedTextColor = '#111111';
    this.selectedBgColor = '#ffffff';
    this.selectedDir = 'yoko'; // 文字方向の一時状態管理
    this.selectedWeight = 'normal'; // 文字の太さの一時状態管理

    // ツール別最新スタイル履歴（2個目の新規作成時は初期値に戻る設計）
    this.toolStyles = {
      webbing: { fontSize: 14, fontWeight: 'normal', color: '#111111', bg: '#ffffff', dir: 'yoko' },
      mindmap: { fontSize: 14, fontWeight: 'normal', color: '#111111', bg: '#ffffff', dir: 'yoko' },
      jellyfish: { fontSize: 14, fontWeight: 'normal', color: '#111111', bg: '#ffffff', dir: 'yoko' }
    };

    this.init();
  }

  init() {
    this.renderPalettes();
    this.renderSaved();
    this.setupGlobalClick();
    this.setupBackgroundPan();
    this.enableDragSort(); // ドラッグ並び替えの有効化を追加
  }

  uid() {
    return 'n' + (this.idCounter++);
  }

  // ドラッグソート機能（PCマウス & スマホタッチ両対応）
  enableDragSort() {
    const grid = document.getElementById('saved-grid');
    if (!grid) return;

    let dragEl = null;
    let startY = 0;
    let isDragging = false; // 実際に並び替え中かどうかのフラグ

    const getMouseY = e => e.touches ? e.touches[0].clientY : e.clientY;

    const onStart = (e, card) => {
      // 削除ボタンやつまみ以外の通常クリック・タップは完全に無視
      if (e.target.closest('.saved-card-del')) return;
      if (!e.target.closest('.saved-card-drag-handle')) return;

      dragEl = card;
      startY = getMouseY(e);
      isDragging = false; // まだ並び替え状態にはしない（ダサい点線等の生成もなし）

      if (e.cancelable) e.preventDefault();
    };

    const onMove = e => {
      if (!dragEl) return;
      const y = getMouseY(e);

      // 元のタップした位置からY軸に 5px 以上動いた時点で初めて「並び替えドラッグ開始」と判定
      if (!isDragging && Math.abs(y - startY) > 5) {
        isDragging = true;
        dragEl.classList.add('dragging'); // 浮き上がるクラスを適用
      }

      if (!isDragging) return; // 5px未満なら何も実行しない（クリックによる誤動作防止）

      // 自分以外の非ドラッグ中カードをリスト化
      const siblings = [...grid.querySelectorAll('.saved-card:not(.dragging)')];
      
      // 現在のポインタY座標に近い挿入先（他のカードの中央ライン）を検出
      const nextSibling = siblings.find(sibling => {
        const rect = sibling.getBoundingClientRect();
        return y < rect.top + rect.height / 2;
      });

      // 点線枠を使わず、直接リアルタイムにカード位置をぬるぬると差し替える
      grid.insertBefore(dragEl, nextSibling);
    };

    const onEnd = () => {
      if (!dragEl) return;

      if (isDragging) {
        dragEl.classList.remove('dragging');
        this.saveNewOrder(); // 順番が入れ替わった結果をブラウザに自動保存
      }

      dragEl = null;
      isDragging = false;
    };

    // 親コンテナ（#saved-grid）でのイベント一括管理
    grid.addEventListener('mousedown', e => {
      const card = e.target.closest('.saved-card');
      if (card) onStart(e, card);
    });
    grid.addEventListener('touchstart', e => {
      const card = e.target.closest('.saved-card');
      if (card) onStart(e, card);
    }, { passive: false });

    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: false });

    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchend', onEnd);
  }

  // ドラッグ後のDOMの並び順に合わせて、ストレージ内のデータ順を並び替えて更新
  saveNewOrder() {
    const grid = document.getElementById('saved-grid');
    const cards = [...grid.querySelectorAll('.saved-card')];
    const newIds = cards.map(c => c.getAttribute('data-id'));

    const arr = this.getSaved();
    const sortedArr = [];

    // DOMの並び順（上から下）の順番通りにデータを配列化
    newIds.forEach(id => {
      const item = arr.find(p => p.id === id);
      if (item) sortedArr.push(item);
    });

    // 読み込み時に.reverse()される設計と整合性を取るため、逆順にしてセーブ
    this.setSaved(sortedArr.reverse());
  }

  // ============================================================
  // SNAPSHOT & HISTORY (Undo/Redo)
  // ============================================================
  snapshot() {
    this.undoStack.push(JSON.stringify({ nodes: this.nodes, edges: this.edges }));
    if (this.undoStack.length > 60) this.undoStack.shift();
    this.redoStack = [];
    this.updateUndoRedoBtns();
    this.scheduleAutoSave();
  }

  undo() {
    if (!this.undoStack.length) return;
    this.redoStack.push(JSON.stringify({ nodes: this.nodes, edges: this.edges }));
    const s = JSON.parse(this.undoStack.pop());
    this.nodes = s.nodes;
    this.edges = s.edges;
    this.updateUndoRedoBtns();
    this.renderCanvas();
    this.scheduleAutoSave();
  }

  redo() {
    if (!this.redoStack.length) return;
    this.undoStack.push(JSON.stringify({ nodes: this.nodes, edges: this.edges }));
    const s = JSON.parse(this.redoStack.pop());
    this.nodes = s.nodes;
    this.edges = s.edges;
    this.updateUndoRedoBtns();
    this.renderCanvas();
    this.scheduleAutoSave();
  }

  updateUndoRedoBtns() {
    document.getElementById('btn-undo').disabled = this.undoStack.length === 0;
    document.getElementById('btn-redo').disabled = this.redoStack.length === 0;
  }

  // ============================================================
  // SAVE / LOAD SYSTEM
  // ============================================================
  scheduleAutoSave() {
    clearTimeout(this.autoSaveTimer);
    this.autoSaveTimer = setTimeout(() => this.doSave(), USER_SETTINGS.AUTO_SAVE_DELAY);
  }

  manualSave() {
    this.doSave();
    this.showToast();
  }

  doSave() {
    if (!this.currentProjId) return;
    const title = document.getElementById('editor-title').value || '無題';
    const date = this.nowStr();
    let arr = this.getSaved();
    const idx = arr.findIndex(p => p.id === this.currentProjId);
    const proj = {
      id: this.currentProjId,
      title,
      date,
      tool: this.currentTool,
      nodes: this.nodes,
      edges: this.edges,
      idCounter: this.idCounter,
      roots: [...this.rootNodeIds],
      toolStyles: this.toolStyles // 各ツール用の最新設定を保存
    };
    if (idx >= 0) arr[idx] = proj;
    else arr.push(proj);
    this.setSaved(arr);
  }

  showToast() {
    const t = document.getElementById('save-toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), USER_SETTINGS.TOAST_DURATION);
  }

  nowStr() {
    const d = new Date();
    return `${d.getFullYear()}/${this.pad(d.getMonth() + 1)}/${this.pad(d.getDate())} ${this.pad(d.getHours())}:${this.pad(d.getMinutes())}`;
  }

  pad(n) {
    return String(n).padStart(2, '0');
  }

  getSaved() {
    try {
      return JSON.parse(localStorage.getItem(USER_SETTINGS.LOCAL_STORAGE_KEY) || '[]');
    } catch {
      return [];
    }
  }

  setSaved(arr) {
    localStorage.setItem(USER_SETTINGS.LOCAL_STORAGE_KEY, JSON.stringify(arr));
  }

  deleteProject(id) {
    this.setSaved(this.getSaved().filter(p => p.id !== id));
    this.renderSaved();
  }

  // ============================================================
  // HOME PORTAL RENDER（横長箇条書き型リスト表示）
  // ============================================================
  renderSaved() {
    const grid = document.getElementById('saved-grid');
    const arr = this.getSaved().slice().reverse();
    if (!arr.length) {
      grid.innerHTML = '<p class="empty-saved">まだ<ruby>作<rt>さく</rt>成<rt>せい</rt></ruby>したツールはありません</p>';
      return;
    }
    grid.innerHTML = arr.map(p => `
      <!-- 並び順のスキャン用に data-id を付与 -->
      <div class="saved-card" onclick="loadProject('${p.id}')" data-id="${p.id}">
        <!-- 0. ドラッグ用つまみ（カードクリックが誤動作しないようにイベント伝播を防止） -->
        <div class="saved-card-drag-handle" onclick="event.stopPropagation()">☰</div>
        <!-- 1. ツールアイコン -->
        <div class="saved-card-thumb">
          ${this.thumbIcon(p.tool)}
        </div>
        <!-- 2. 名前 -->
        <div class="saved-card-label">${this.esc(p.title)}</div>
        <!-- 3. 更新日時 -->
        <div class="saved-card-date">${this.esc(p.date)}</div>
        <!-- 4. 削除ボタン -->
        <button class="saved-card-del" onclick="event.stopPropagation();deleteProject('${p.id}')">さくじょ</button>
      </div>`).join('');
  }

  esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  thumbIcon(t) {
    const map = {
      // ツール選択画面（ホーム）の美しいSVGコードと100%同一に統一
      // width/heightを100%に設定して、作業履歴の48pxミニ四角枠内にアスペクト比を保って自動ジャストフィットさせます
      webbing:   `<svg width="100%" height="100%" viewBox="0 0 100 76"><circle cx="50" cy="38" r="14" fill="none" stroke="#333" stroke-width="2.5"/><rect x="2"  y="2"  width="22" height="14" rx="4" fill="none" stroke="#333" stroke-width="2"/><rect x="76" y="2"  width="22" height="14" rx="4" fill="none" stroke="#333" stroke-width="2"/><rect x="2"  y="60" width="22" height="14" rx="4" fill="none" stroke="#333" stroke-width="2"/><rect x="76" y="60" width="22" height="14" rx="4" fill="none" stroke="#333" stroke-width="2"/><line x1="36" y1="30" x2="24" y2="9"  stroke="#333" stroke-width="1.5"/><line x1="64" y1="30" x2="76" y2="9"  stroke="#333" stroke-width="1.5"/><line x1="36" y1="46" x2="24" y2="67" stroke="#333" stroke-width="1.5"/><line x1="64" y1="46" x2="76" y2="67" stroke="#333" stroke-width="1.5"/></svg>`,
      mindmap:   `<svg width="100%" height="100%" viewBox="0 0 100 76"><circle cx="28" cy="38" r="16" fill="none" stroke="#333" stroke-width="2.5"/><rect x="54" y="6"  width="38" height="13" rx="4" fill="none" stroke="#333" stroke-width="1.8"/><rect x="54" y="24" width="38" height="13" rx="4" fill="none" stroke="#333" stroke-width="1.8"/><rect x="54" y="42" width="38" height="13" rx="4" fill="none" stroke="#333" stroke-width="1.8"/><rect x="54" y="60" width="38" height="13" rx="4" fill="none" stroke="#333" stroke-width="1.8"/><line x1="44" y1="30" x2="54" y2="12" stroke="#333" stroke-width="1.5"/><line x1="44" y1="35" x2="54" y2="30" stroke="#333" stroke-width="1.5"/><line x1="44" y1="41" x2="54" y2="48" stroke="#333" stroke-width="1.5"/><line x1="44" y1="46" x2="54" y2="66" stroke="#333" stroke-width="1.5"/></svg>`,
      jellyfish: `<svg width="100%" height="100%" viewBox="0 0 100 76"><path d="M10,42 Q50,4 90,42" fill="#8a7e6d" stroke="#333" stroke-width="2"/><line x1="22" y1="42" x2="16" y2="66" stroke="#333" stroke-width="2"/><line x1="50" y1="42" x2="50" y2="66" stroke="#333" stroke-width="2"/><line x1="78" y1="42" x2="84" y2="66" stroke="#333" stroke-width="2"/><rect x="4"  y="60" width="22" height="14" rx="4" fill="none" stroke="#333" stroke-width="1.8"/><rect x="39" y="60" width="22" height="14" rx="4" fill="none" stroke="#333" stroke-width="1.8"/><rect x="74" y="60" width="22" height="14" rx="4" fill="none" stroke="#333" stroke-width="1.8"/></svg>`,
    };
    return map[t] || '';
  }

  loadProject(id) {
    const p = this.getSaved().find(x => x.id === id);
    if (!p) return;
    this.currentProjId = p.id;
    this.currentTool   = p.tool;
    this.nodes         = p.nodes;
    this.edges         = p.edges;
    this.idCounter     = p.idCounter || 100;
    this.rootNodeIds   = new Set(p.roots || []);
    
    // セーブデータから前回のツール用最新スタイルをロード。無い場合はデフォルト値に安全フォールバック
    this.toolStyles    = p.toolStyles || {
      webbing: { fontSize: 14, fontWeight: 'normal', color: '#111111', bg: '#ffffff', dir: 'yoko' },
      mindmap: { fontSize: 14, fontWeight: 'normal', color: '#111111', bg: '#ffffff', dir: 'yoko' },
      jellyfish: { fontSize: 14, fontWeight: 'normal', color: '#111111', bg: '#ffffff', dir: 'yoko' }
    };

    this.undoStack = [];
    this.redoStack = [];
    document.getElementById('editor-title').value = p.title || '無題';
    this.openEditor();
    this.renderCanvas();
    this.scrollToCenter();
    this.updateUndoRedoBtns();
  }

  // ============================================================
  // PORTAL ACTIONS
  // ============================================================
  openToolSelect() {
    document.getElementById('tool-modal').classList.add('open');
  }

  closeToolSelect() {
    document.getElementById('tool-modal').classList.remove('open');
  }

  openToolSelectFromEditor() {
    this.closeEditor();
    this.openToolSelect();
  }

  createNew(tool) {
    this.currentTool   = tool;
    this.currentProjId = 'proj_' + Date.now();
    this.nodes = [];
    this.edges = [];
    this.idCounter = 1;
    this.rootNodeIds = new Set();

    // 2個目の新規作成時は、まっさらな初期状態で崩れなく表示できるよう設定をリセット
    this.toolStyles = {
      webbing: { fontSize: 14, fontWeight: 'normal', color: '#111111', bg: '#ffffff', dir: 'yoko' },
      mindmap: { fontSize: 14, fontWeight: 'normal', color: '#111111', bg: '#ffffff', dir: 'yoko' },
      jellyfish: { fontSize: 14, fontWeight: 'normal', color: '#111111', bg: '#ffffff', dir: 'yoko' }
    };

    this.undoStack = [];
    this.redoStack = [];
    document.getElementById('editor-title').value = this.toolLabel(tool);
    this.buildLayout(tool);
    this.openEditor();
    this.renderCanvas();
    this.scrollToCenter();
    this.updateUndoRedoBtns();
    this.doSave();
  }

  toolLabel(t) {
    return { webbing: 'タイヨウ マップ', mindmap: 'ハリネズミ マップ', jellyfish: 'クラゲ マップ' }[t] || t;
  }

  // ============================================================
  // CANVAS LAYOUT GENERATORS
  // ============================================================
  buildLayout(tool) {
    const cx = USER_SETTINGS.CANVAS_WIDTH / 2;
    const cy = USER_SETTINGS.CANVAS_HEIGHT / 2;
    if (tool === 'webbing') {
      const center = this.mk(cx - 60, cy - 60, '', 'center');
      this.rootNodeIds.add(center.id);
      const angles = [225, 315, 45, 135];
      const r = 280;
      angles.forEach(a => {
        const rad = a * Math.PI / 180;
        const n = this.mk(cx + r * Math.cos(rad) - 75, cy + r * Math.sin(rad) - 24, '', 'branch');
        this.edges.push({ from: center.id, to: n.id });
      });

    } else if (tool === 'mindmap') {
      const center = this.mk(cx - 200, cy, '', 'center');
      this.rootNodeIds.add(center.id);
      const rightY = [cy - 240, cy - 120, cy, cy + 120, cy + 240];
      rightY.forEach(y => {
        const n = this.mk(cx + 160, y - 24, '', 'branch');
        this.edges.push({ from: center.id, to: n.id });
      });

    } else if (tool === 'jellyfish') {
      const dome = this.mk(cx - 110, cy - 280, '', 'jellyfish-dome');
      this.rootNodeIds.add(dome.id);
      const xs = [cx - 440, cx - 220, cx, cx + 220, cx + 440];
      xs.forEach(x => {
        const n = this.mk(x - 75, cy + 60, '', 'branch');
        this.edges.push({ from: dome.id, to: n.id });
      });
    }
  }

  mk(x, y, text, type) {
    const defaultWidth = type === 'jellyfish-dome' ? 220 : (type === 'center' ? 120 : 150);
    const defaultHeight = type === 'center' ? 120 : 48;

    // 現在のツール用の最新お気に入りスタイルを取得（無ければ標準の初期スタイル）
    const style = (this.toolStyles && this.currentTool && this.toolStyles[this.currentTool]) || {
      fontSize: 14, fontWeight: 'normal', color: '#111111', bg: '#ffffff', dir: 'yoko'
    };

    const n = {
      id: this.uid(), x, y, text, type,
      fontSize: style.fontSize,
      fontWeight: style.fontWeight,
      color: style.color,
      bg: style.bg,
      dir: style.dir,
      width: defaultWidth,
      height: defaultHeight
    };
    this.nodes.push(n);
    return n;
  }

  // ============================================================
  // EDITOR VIEWPORT CONTROL
  // ============================================================
  openEditor() {
    document.getElementById('editor-screen').classList.add('open');
    document.getElementById('home-screen').style.display = 'none';
    this.zoomLevel = 1.0;
    this.applyZoom();
  }

  closeEditor() {
    this.doSave();
    document.getElementById('editor-screen').classList.remove('open');
    document.getElementById('home-screen').style.display = 'block';
    this.selectedId = null;
    this.renderSaved();
  }

  scrollToCenter() {
    const wrap = document.getElementById('canvas-wrap');
    if (!wrap) return;

    const doScroll = () => {
      let targetX = USER_SETTINGS.CANVAS_WIDTH / 2;
      let targetY = USER_SETTINGS.CANVAS_HEIGHT / 2;

      const rootId = [...this.rootNodeIds][0];
      const rootNode = this.nodes.find(n => n.id === rootId);
      if (rootNode) {
        if (rootNode.type === 'jellyfish-dome') {
          targetX = rootNode.x + 110;
          targetY = rootNode.y + 80;
        } else if (rootNode.type === 'center') {
          targetX = rootNode.x + 60;
          targetY = rootNode.y + 60;
        } else {
          targetX = rootNode.x + (rootNode.width / 2);
          targetY = rootNode.y + 24;
        }
      }

      const wrapWidth = wrap.clientWidth || window.innerWidth;
      const wrapHeight = wrap.clientHeight || window.innerHeight;

      let ratioX = 0.5;
      let ratioY = 0.5;

      if (this.currentTool === 'mindmap') {
        ratioX = 0.15;
      } else if (this.currentTool === 'jellyfish') {
        ratioY = 0.15;
      }

      wrap.scrollLeft = (targetX * this.zoomLevel) - (wrapWidth * ratioX);
      wrap.scrollTop = (targetY * this.zoomLevel) - (wrapHeight * ratioY);
    };

    if (wrap.clientWidth === 0) {
      requestAnimationFrame(() => {
        requestAnimationFrame(doScroll);
      });
    } else {
      doScroll();
    }
  }

  changeZoom(d) {
    this.zoomLevel = Math.max(USER_SETTINGS.ZOOM_MIN, Math.min(USER_SETTINGS.ZOOM_MAX, this.zoomLevel + d));
    this.applyZoom();
  }

  resetZoom() {
    this.zoomLevel = 1.0;
    this.applyZoom();
  }

  applyZoom() {
    const canvas = document.getElementById('editor-canvas');
    if (!canvas) return;

    let originX = USER_SETTINGS.CANVAS_WIDTH / 2;
    let originY = USER_SETTINGS.CANVAS_HEIGHT / 2;

    const rootId = [...this.rootNodeIds][0];
    const rootNode = this.nodes.find(n => n.id === rootId);
    if (rootNode) {
      if (rootNode.type === 'jellyfish-dome') {
        originX = rootNode.x + 110;
        originY = rootNode.y + 80;
      } else if (rootNode.type === 'center') {
        originX = rootNode.x + 60;
        originY = rootNode.y + 60;
      } else {
        originX = rootNode.x + (rootNode.width / 2);
        originY = rootNode.y + 24;
      }
    }

    canvas.style.transformOrigin = `${originX}px ${originY}px`;
    canvas.style.transform = `scale(${this.zoomLevel})`;
  }

  // ============================================================
  // CANVAS DRAWING & NODES
  // ============================================================
  renderCanvas() {
    const canvas = document.getElementById('editor-canvas');
    canvas.querySelectorAll('.node').forEach(el => el.remove());
    this.nodes.forEach(n => canvas.appendChild(this.makeNodeEl(n)));
    this.drawLines();
  }

  makeNodeEl(n) {
    const wrap = document.createElement('div');
    wrap.className = 'node' + (n.type ? ` type-${n.type}` : '');
    wrap.id = 'node-' + n.id;
    const heightProp = n.dir === 'tate' ? `height:${n.height}px;` : `min-height:${n.height}px;`;
    wrap.style.cssText = `left:${n.x}px;top:${n.y}px;position:absolute;width:${n.width}px;${heightProp}`;

    const body = document.createElement('div');
    body.className = 'node-body';
    body.style.width = '100%';
    this.applyBodyStyle(body, n);

    body.textContent = n.text || '';
    if (n.dir === 'tate') body.style.writingMode = 'vertical-rl';

    const resizerTypes = ['r', 'l', 'b', 't', 'se'];
    resizerTypes.forEach(type => {
      const resizer = document.createElement('div');
      resizer.className = `resizer resizer-${type}`;
      wrap.appendChild(resizer);
      this.makeResizable(wrap, resizer, n, type);
    });

    const actions = document.createElement('div');
    actions.className = 'node-actions';

    const addBtn = document.createElement('button');
    addBtn.className = 'node-act-btn btn-add-child';
    addBtn.textContent = '＋';
    addBtn.onclick = e => { e.stopPropagation(); this.addChild(n.id); };

    const delBtn = document.createElement('button');
    delBtn.className = 'node-act-btn btn-del-node';
    delBtn.innerHTML = '<ruby>削<rt>さく</rt>除<rt>じょ</rt></ruby>';
    const isRoot = this.rootNodeIds.has(n.id);
    if (isRoot) delBtn.classList.add('hidden');
    else delBtn.onclick = e => { e.stopPropagation(); this.deleteNode(n.id); };

    actions.appendChild(addBtn);
    actions.appendChild(delBtn);
    wrap.appendChild(body);
    wrap.appendChild(actions);

    wrap.addEventListener('click',    e => { e.stopPropagation(); this.selectNode(n.id); });
    wrap.addEventListener('dblclick', e => { e.stopPropagation(); this.openTextModal(n.id); });
    this.makeDraggable(wrap, n);
    return wrap;
  }

  applyBodyStyle(el, n) {
    el.style.fontSize   = (n.fontSize || 14) + 'px';
    el.style.fontWeight = n.fontWeight || 'normal';
    el.style.color      = n.color || '#111111';
    el.style.background = n.bg || '#ffffff';
    if (n.dir === 'tate') el.style.writingMode = 'vertical-rl';
    else el.style.writingMode = 'horizontal-tb';
  }

  // ============================================================
  // CONNECTOR LINES
  // ============================================================
  nodeCenter(n) {
    const el = document.getElementById('node-' + n.id);
    if (!el) return { x: n.x + (n.width / 2), y: n.y + (n.height / 2) };
    return { x: n.x + el.offsetWidth / 2, y: n.y + el.offsetHeight / 2 };
  }

  setupBackgroundPan() {
    const wrap = document.getElementById('canvas-wrap');
    if (!wrap) return;

    let isPanning = false;
    let startX, startY;
    let scrollLeft, scrollTop;

    const onStart = (cx, cy, target) => {
      if (
        target.closest('.node') || 
        target.closest('button') || 
        target.closest('input') || 
        target.closest('textarea') || 
        target.closest('path')
      ) {
        return;
      }
      isPanning = true;
      wrap.style.cursor = 'grabbing';
      startX = cx;
      startY = cy;
      scrollLeft = wrap.scrollLeft;
      scrollTop = wrap.scrollTop;
    };

    const onMove = (cx, cy) => {
      if (!isPanning) return;
      const dx = cx - startX;
      const dy = cy - startY;
      wrap.scrollLeft = scrollLeft - dx;
      wrap.scrollTop = scrollTop - dy;
    };

    const onEnd = () => {
      if (isPanning) {
        isPanning = false;
        wrap.style.cursor = 'auto';
      }
    };

    wrap.addEventListener('mousedown', e => onStart(e.clientX, e.clientY, e.target));
    document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    document.addEventListener('mouseup', onEnd);

    wrap.addEventListener('touchstart', e => {
      const t = e.touches[0];
      onStart(t.clientX, t.clientY, e.target);
    }, { passive: true });
    document.addEventListener('touchmove', e => {
      const t = e.touches[0];
      onMove(t.clientX, t.clientY);
    }, { passive: true });
    document.addEventListener('touchend', onEnd);
  }

  drawLines() {
    const svg = document.getElementById('lines-svg');
    svg.innerHTML = '';
    this.edges.forEach(e => {
      const from = this.nodes.find(n => n.id === e.from);
      const to   = this.nodes.find(n => n.id === e.to);
      if (!from || !to) return;
      const fc = this.nodeCenter(from);
      const tc = this.nodeCenter(to);

      if (e.curveness === undefined) e.curveness = 0;

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      let d = '';

      if (e.curveness === 0) {
        d = `M ${fc.x} ${fc.y} L ${tc.x} ${tc.y}`;
      } else {
        const mx = (fc.x + tc.x) / 2;
        const my = (fc.y + tc.y) / 2;
        const dx = tc.x - fc.x;
        const dy = tc.y - fc.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const nx = -dy / len;
        const ny = dx / len;
        const cx = mx + nx * e.curveness;
        const cy = my + ny * e.curveness;
        d = `M ${fc.x} ${fc.y} Q ${cx} ${cy} ${tc.x} ${tc.y}`;
      }

      const visualPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      visualPath.setAttribute('d', d);
      visualPath.setAttribute('stroke', '#888888');
      visualPath.setAttribute('stroke-width', '2.5');
      visualPath.setAttribute('fill', 'none');

      const hitPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      hitPath.setAttribute('d', d);
      hitPath.setAttribute('stroke', 'rgba(0, 0, 0, 0.001)');
      hitPath.setAttribute('stroke-width', '32');
      hitPath.setAttribute('fill', 'none');
      hitPath.style.cursor = 'ns-resize';
      hitPath.style.pointerEvents = 'stroke';

      g.appendChild(visualPath);
      g.appendChild(hitPath);
      svg.appendChild(g);

      this.makeLineBendable(hitPath, e, fc, tc);
    });
  }

  makeLineBendable(pathEl, edge, fc, tc) {
    let dragging = false;

    const onMouseMove = e => {
      if (dragging) onMove(e.clientX, e.clientY);
    };

    const onMouseUp = () => {
      if (dragging) {
        dragging = false;
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        this.scheduleAutoSave();
      }
    };

    const onTouchMove = e => {
      if (dragging) {
        const t = e.touches[0];
        onMove(t.clientX, t.clientY);
        if (e.cancelable) e.preventDefault();
      }
    };

    const onTouchEnd = () => {
      if (dragging) {
        dragging = false;
        document.removeEventListener('touchmove', onTouchMove);
        document.removeEventListener('touchend', onTouchEnd);
        this.scheduleAutoSave();
      }
    };

    const onStart = () => {
      dragging = true;
      this.snapshot();
    };

    const onMove = (cx, cy) => {
      if (!dragging) return;
      const rect = document.getElementById('editor-canvas').getBoundingClientRect();
      const mx = (cx - rect.left) / this.zoomLevel;
      const my = (cy - rect.top) / this.zoomLevel;

      const dx = tc.x - fc.x;
      const dy = tc.y - fc.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const nx = -dy / len;
      const ny = dx / len;

      const amx = mx - fc.x;
      const amy = my - fc.y;

      const projDist = amx * nx + amy * ny;
      edge.curveness = projDist * 1.35;

      if (Math.abs(edge.curveness) < 8) {
        edge.curveness = 0;
      }

      this.drawLines();
    };

    pathEl.addEventListener('mousedown', e => {
      e.stopPropagation();
      onStart();
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    pathEl.addEventListener('touchstart', e => {
      e.stopPropagation();
      onStart();
      document.addEventListener('touchmove', onTouchMove, { passive: false });
      document.addEventListener('touchend', onTouchEnd);
      if (e.cancelable) e.preventDefault();
    }, { passive: false });
  }

  // ============================================================
  // NODE OPERATION ACTIONS
  // ============================================================
  selectNode(id) {
    this.selectedId = id;
    document.querySelectorAll('.node').forEach(el => el.classList.remove('selected'));
    const el = document.getElementById('node-' + id);
    if (el) el.classList.add('selected');
  }

  setupGlobalClick() {
    document.addEventListener('click', e => {
      if (!e.target.closest('.node') && !e.target.closest('.text-modal')) {
        this.selectedId = null;
        document.querySelectorAll('.node').forEach(el => el.classList.remove('selected'));
      }
    });
  }

  addStickyNote() {
    this.snapshot();
    const wrap = document.getElementById('canvas-wrap');
    const scrollLeft = wrap ? wrap.scrollLeft : 0;
    const scrollTop = wrap ? wrap.scrollTop : 0;
    const width = wrap ? wrap.clientWidth : 800;
    const height = wrap ? wrap.clientHeight : 600;

    const cx = (scrollLeft + width / 2) / this.zoomLevel - 75;
    const cy = (scrollTop + height / 2) / this.zoomLevel - 50;

    const sticky = this.mk(cx, cy, '', 'sticky');
    sticky.width = 150;
    sticky.height = 100;
    
    const bgColors = USER_SETTINGS.PALETTE_BG_COLORS;
    sticky.bg = bgColors[bgColors.length - 1];

    const canvas = document.getElementById('editor-canvas');
    canvas.appendChild(this.makeNodeEl(sticky));
    this.selectNode(sticky.id);
    this.scheduleAutoSave();
  }

  addChild(parentId) {
    this.snapshot();
    const parent = this.nodes.find(n => n.id === parentId);
    if (!parent) return;
    const child = this.mk(parent.x + 240, parent.y + 70, '', 'branch');
    this.edges.push({ from: parentId, to: child.id });
    const canvas = document.getElementById('editor-canvas');
    canvas.appendChild(this.makeNodeEl(child));
    this.drawLines();
    this.selectNode(child.id);
  }

  deleteNode(id) {
    if (this.rootNodeIds.has(id)) return;
    this.snapshot();
    const toRemove = this.collectDescendants(id);
    toRemove.forEach(rid => {
      this.nodes = this.nodes.filter(n => n.id !== rid);
      this.edges = this.edges.filter(e => e.from !== rid && e.to !== rid);
      const el = document.getElementById('node-' + rid);
      if (el) el.remove();
    });
    this.drawLines();
  }

  collectDescendants(id) {
    const result = [id];
    const children = this.edges.filter(e => e.from === id).map(e => e.to);
    children.forEach(cid => result.push(...this.collectDescendants(cid)));
    return result;
  }

  // ============================================================
  // DRAGGABLE CONTROLLER
  // ============================================================
  makeDraggable(el, n) {
    let sx, sy, snx, sny, dragging = false, moved = false;
    let lastTapTime = 0;

    const onMouseMove = e => {
      if (!dragging) return;
      const dx = (e.clientX - sx) / this.zoomLevel;
      const dy = (e.clientY - sy) / this.zoomLevel;
      if (!moved && Math.abs(dx) + Math.abs(dy) > 3) { this.snapshot(); moved = true; }
      n.x = snx + dx; n.y = sny + dy;
      el.style.left = n.x + 'px'; el.style.top = n.y + 'px';
      this.drawLines();
    };

    const onMouseUp = () => {
      if (dragging) {
        dragging = false;
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        if (moved) this.scheduleAutoSave();
      }
    };

    const onTouchMove = e => {
      if (!dragging) return;
      const t = e.touches[0];
      const dx = (t.clientX - sx) / this.zoomLevel;
      const dy = (t.clientY - sy) / this.zoomLevel;
      if (!moved && Math.abs(dx) + Math.abs(dy) > 3) { this.snapshot(); moved = true; }
      n.x = snx + dx; n.y = sny + dy;
      el.style.left = n.x + 'px'; el.style.top = n.y + 'px';
      this.drawLines();
      if (e.cancelable) e.preventDefault();
    };

    const onTouchEnd = () => {
      if (dragging) {
        dragging = false;
        document.removeEventListener('touchmove', onTouchMove);
        document.removeEventListener('touchend', onTouchEnd);
        if (moved) this.scheduleAutoSave();
      }
    };

    const startDrag = (cx, cy) => {
      sx = cx; sy = cy; snx = n.x; sny = n.y;
      dragging = true; moved = false;
    };

    el.addEventListener('mousedown', e => { 
      if (e.target.tagName !== 'BUTTON' && !e.target.classList.contains('resizer')) { 
        startDrag(e.clientX, e.clientY); 
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        e.preventDefault(); 
      } 
    });

    el.addEventListener('touchstart', e => {
      if (e.target.tagName !== 'BUTTON' && !e.target.classList.contains('resizer')) {
        e.stopPropagation();
        
        const t = e.touches[0];
        startDrag(t.clientX, t.clientY);

        document.addEventListener('touchmove', onTouchMove, { passive: false });
        document.addEventListener('touchend', onTouchEnd);

        const now = Date.now();
        const DOUBLE_TAP_DELAY = 300;
        if (now - lastTapTime < DOUBLE_TAP_DELAY) {
          this.openTextModal(n.id);
        } else {
          this.selectNode(n.id);
        }
        lastTapTime = now;
      }
    }, { passive: true });
  }

  // ============================================================
  // RESIZABLE CONTROLLER
  // ============================================================
  makeResizable(el, handle, n, type) {
    let sx, sy, sw, sh, snx, sny, resizing = false, resized = false;

    const onMouseMove = e => {
      if (!resizing) return;
      const dx = (e.clientX - sx) / this.zoomLevel;
      const dy = (e.clientY - sy) / this.zoomLevel;
      applyResize(dx, dy);
    };

    const onMouseUp = () => {
      if (resizing) {
        resizing = false;
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        if (resized) this.scheduleAutoSave();
      }
    };

    const onTouchMove = e => {
      if (!resizing) return;
      const t = e.touches[0];
      const dx = (t.clientX - sx) / this.zoomLevel;
      const dy = (t.clientY - sy) / this.zoomLevel;
      applyResize(dx, dy);
      if (e.cancelable) e.preventDefault();
    };

    const onTouchEnd = () => {
      if (resizing) {
        resizing = false;
        document.removeEventListener('touchmove', onTouchMove);
        document.removeEventListener('touchend', onTouchEnd);
        if (resized) this.scheduleAutoSave();
      }
    };

    const startResize = (cx, cy) => {
      sx = cx;
      sy = cy;
      sw = n.width || el.offsetWidth;
      sh = n.height || el.offsetHeight;
      snx = n.x;
      sny = n.y;
      resizing = true;
      resized = false;
    };

    const applyResize = (dx, dy) => {
      if (!resized && (Math.abs(dx) > 1 || Math.abs(dy) > 1)) {
        this.snapshot();
        resized = true;
      }

      if (type === 'r' || type === 'se') {
        n.width = Math.max(80, sw + dx);
      }
      if (type === 'l') {
        const targetWidth = sw - dx;
        if (targetWidth > 80) {
          n.width = targetWidth;
          n.x = snx + dx;
        }
      }
      if (type === 'b' || type === 'se') {
        n.height = Math.max(40, sh + dy);
      }
      if (type === 't') {
        const targetHeight = sh - dy;
        if (targetHeight > 40) {
          n.height = targetHeight;
          n.y = sny + dy;
        }
      }

      el.style.width = n.width + 'px';
      el.style.minHeight = n.height + 'px';
      el.style.left = n.x + 'px';
      el.style.top = n.y + 'px';
      this.drawLines();
    };

    handle.addEventListener('mousedown', e => {
      e.stopPropagation();
      e.preventDefault();
      startResize(e.clientX, e.clientY);
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    handle.addEventListener('touchstart', e => {
      e.stopPropagation();
      e.preventDefault();
      const t = e.touches[0];
      startResize(t.clientX, t.clientY);
      document.addEventListener('touchmove', onTouchMove, { passive: false });
      document.addEventListener('touchend', onTouchEnd);
    }, { passive: false });
  }

  // ============================================================
  // TEXT MODAL CONTROL
  // ============================================================
  openTextModal(nodeId) {
    this.editingId = nodeId;
    const n = this.nodes.find(x => x.id === nodeId);
    if (!n) return;
    document.getElementById('node-text-input').value  = n.text || '';
    document.getElementById('font-size-slider').value = n.fontSize || 14;

    this.selectPaletteColor('text', n.color || '#111111');
    this.selectPaletteColor('bg', n.bg || '#ffffff');

    // 実際のデータを直接書き換えないよう、一時保存用の状態プロパティに値を非破壊コピー
    this.selectedDir = n.dir || 'yoko';
    this.selectedWeight = n.fontWeight || 'normal';

    this.updateDirUI(this.selectedDir);
    this.updateWeightUI(this.selectedWeight);

    document.getElementById('text-modal').classList.add('open');
    setTimeout(() => document.getElementById('node-text-input').focus(), 80);
  }

  confirmNodeText() {
    const n = this.nodes.find(x => x.id === this.editingId);
    if (!n) { this.cancelNodeText(); return; }
    this.snapshot();
    n.text       = document.getElementById('node-text-input').value;
    n.fontSize   = parseInt(document.getElementById('font-size-slider').value);
    n.color      = this.selectedTextColor;
    n.bg         = this.selectedBgColor;
    n.fontWeight = this.selectedWeight; // 決定時に文字の太さを適用

    // 決定時に文字の向きが変わっていた場合のみ、縦横幅を入れ替える
    if (n.dir !== this.selectedDir) {
      const temp = n.width;
      n.width = n.height;
      n.height = temp;
      n.dir = this.selectedDir;
    }

    // 適用した最新のスタイルを、現在のツール用履歴に引き継ぎ保存
    if (this.currentTool && this.toolStyles) {
      this.toolStyles[this.currentTool] = {
        fontSize: n.fontSize,
        fontWeight: n.fontWeight,
        color: n.color,
        bg: n.bg,
        dir: n.dir
      };
    }

    this.cancelNodeText();
    const old = document.getElementById('node-' + n.id);
    if (old) { old.replaceWith(this.makeNodeEl(n)); }
    this.drawLines();
  }

  cancelNodeText() {
    document.getElementById('text-modal').classList.remove('open');
    this.editingId = null;
  }

  setDir(d) {
    this.selectedDir = d;
    this.updateDirUI(d);
  }

  updateDirUI(d) {
    document.getElementById('dir-tate').classList.toggle('active', d === 'tate');
    document.getElementById('dir-yoko').classList.toggle('active', d === 'yoko');

    const ta = document.getElementById('node-text-input');
    if (d === 'tate') {
      ta.style.writingMode = 'vertical-rl';
      ta.style.height = '180px';
    } else {
      ta.style.writingMode = 'horizontal-tb';
      ta.style.height = '120px';
    }
  }

  setWeight(w) {
    this.selectedWeight = w;
    this.updateWeightUI(w);
  }

  updateWeightUI(w) {
    document.getElementById('weight-normal').classList.toggle('active', w === 'normal');
    document.getElementById('weight-bold').classList.toggle('active', w === 'bold');
  }

  // ============================================================
  // PALETTE MANAGER
  // ============================================================
  renderPalettes() {
    const tDiv = document.getElementById('text-color-palette');
    const bDiv = document.getElementById('bg-color-palette');

    tDiv.innerHTML = USER_SETTINGS.PALETTE_TEXT_COLORS.map(c =>
      `<button class="palette-btn" style="background:${c}" onclick="selectPaletteColor('text','${c}')"></button>`
    ).join('');

    bDiv.innerHTML = USER_SETTINGS.PALETTE_BG_COLORS.map(c =>
      `<button class="palette-btn" style="background:${c}" onclick="selectPaletteColor('bg','${c}')"></button>`
    ).join('');
  }

  selectPaletteColor(type, color) {
    if (type === 'text') {
      this.selectedTextColor = color;
      document.querySelectorAll('#text-color-palette .palette-btn').forEach((btn, i) => {
        btn.classList.toggle('active', USER_SETTINGS.PALETTE_TEXT_COLORS[i] === color);
      });
    } else {
      this.selectedBgColor = color;
      document.querySelectorAll('#bg-color-palette .palette-btn').forEach((btn, i) => {
        btn.classList.toggle('active', USER_SETTINGS.PALETTE_BG_COLORS[i] === color);
      });
    }
  }
}

// ============================================================
// DOM INITIALIZATION & GLOBAL BINDING
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  const app = new ThinkingToolApp();

  window.undo = () => app.undo();
  window.redo = () => app.redo();
  window.manualSave = () => app.manualSave();
  window.changeZoom = (d) => app.changeZoom(d);
  window.resetZoom = () => app.resetZoom();
  window.openToolSelect = () => app.openToolSelect();
  window.closeToolSelect = () => app.closeToolSelect();
  window.openToolSelectFromEditor = () => app.openToolSelectFromEditor();
  window.createNew = (tool) => app.createNew(tool);
  window.loadProject = (id) => app.loadProject(id);
  window.deleteProject = (id) => app.deleteProject(id);
  window.closeEditor = () => app.closeEditor();
  window.confirmNodeText = () => app.confirmNodeText();
  window.cancelNodeText = () => app.cancelNodeText();
  window.setDir = (d) => app.setDir(d);
  window.setWeight = (w) => app.setWeight(w);
  window.selectPaletteColor = (type, color) => app.selectPaletteColor(type, color);
  window.scheduleAutoSave = () => app.scheduleAutoSave();
  window.addStickyNote = () => app.addStickyNote();
});
</script>
