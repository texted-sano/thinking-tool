<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><ruby>情<rt>じょう</rt>報<rt>ほう</rt>整<rt>せい</rt>理<rt>り</rt></ruby>ツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ===== デジタル教科書準拠の上品な配色テーマ ===== */
:root {
  --bg: #f5f2eb;
  --card: #ffffff;
  --border: #d0c8b8;
  --accent: #a82020;
  --node-border: #a8a090;
  --head-fill: #e3ded5;
  --text: #2a2520;
  --sub: #7a7060;
  --orange: #d35400;
  --green: #27ae60;
  --shadow: rgba(42,37,32,0.06);
}

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

/* ===== RUBY FIX ===== */
ruby {
  display: ruby;
  ruby-position: over;
}
ruby rt {
  display: ruby-text;
  font-size: 0.33em;
  letter-spacing: -0.03em;
  color: var(--sub);
  user-select: none;
}
.btn-new:hover ruby rt {
  color: #fff;
}
.editor-toolbar rt {
  color: #dcd5c9;
}
.toolbar-btn:hover rt {
  color: #fff;
}

/* ===== SHIN-HOME ===== */
#home-screen {
  max-width: 960px;
  margin: 0 auto;
  padding: 48px 24px;
}
.home-header {
  text-align: center;
  margin-bottom: 40px;
}
.home-title {
  display: inline-block;
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: 0.1em;
  color: var(--text);
  border-bottom: 3px double var(--accent);
  padding-bottom: 12px;
}
.btn-new-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
}
.btn-new {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--card);
  color: var(--accent);
  border: 2px solid var(--accent);
  border-radius: 8px;
  padding: 12px 32px;
  font-size: 1.25rem;
  font-weight: 900;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}
.btn-new:hover {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 6px 18px rgba(168,32,32,0.22);
}
.btn-new-plus {
  font-size: 1.4rem;
  font-weight: 700;
}

/* ノート一覧セクション */
.saved-section {
  background: var(--card);
  border-radius: 12px;
  padding: 32px;
  border: 1.5px solid var(--border);
  box-shadow: 0 6px 18px var(--shadow);
}
.saved-title {
  font-size: 1.05rem;
  font-weight: 900;
  margin-bottom: 24px;
  color: var(--sub);
  display: flex;
  align-items: flex-end;
  gap: 8px;
}
.saved-title::before {
  content: "";
  display: inline-block;
  width: 4px;
  height: 18px;
  background: var(--accent);
}
.saved-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 24px;
}
.saved-card {
  background: #fdfcf9;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
}
.saved-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(42,37,32,0.08);
}
.saved-card-label {
  font-size: 0.95rem;
  font-weight: 800;
  color: var(--text);
  line-height: 1.4;
  word-break: break-all;
}
.saved-card-date {
  font-size: 0.72rem;
  color: var(--sub);
  display: inline-flex;
  align-items: baseline;
  gap: 3px;
}
.saved-card-thumb {
  background: #f5f2eb;
  border: 1px dashed var(--border);
  border-radius: 6px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 4px;
  position: relative;
}
.saved-card-thumb svg { opacity: 0.28; }

.saved-card-del {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #ffffff;
  border: 1.5px solid var(--accent);
  border-radius: 6px;
  cursor: pointer;
  color: var(--accent);
  font-size: 0.68rem;
  font-weight: 800;
  padding: 2px 8px;
  transition: all 0.12s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.saved-card-del:hover {
  color: #fff;
  background: var(--accent);
  border-color: var(--accent);
}
.saved-card-del:hover ruby rt {
  color: #fff;
}
.empty-saved { color: var(--sub); font-size: 0.9rem; padding: 8px 0; }

/* ===== TOOL SELECT MODAL ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(50,42,34,0.58); z-index: 500;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #fcfbf9; border-radius: 18px; padding: 32px 28px 28px;
  width: 600px; max-width: 95vw; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.24); position: relative;
  border: 1.5px solid var(--border);
}
.modal-close {
  position: absolute; top: 16px; left: 16px;
  font-size: 1.1rem; font-weight: 700; background: none; border: none;
  cursor: pointer; color: var(--text); padding: 4px 8px;
  border-radius: 6px; transition: background 0.12s;
}
.modal-close:hover { background: #e0dbd0; }
.modal-title { font-size: 1.15rem; font-weight: 800; text-align: center; margin-bottom: 26px; }
.tool-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
.tool-card {
  width: 160px; cursor: pointer; background: #e8e3d8;
  border-radius: 14px; padding: 16px 10px 12px; text-align: center;
  border: 2px solid transparent; transition: border-color 0.14s, background 0.14s;
}
.tool-card:hover { border-color: var(--accent); background: #ddd8cc; }
.tool-card-icon { height: 76px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
.tool-card-icon svg { opacity: 0.65; }
.tool-card-name { font-size: 0.88rem; font-weight: 700; line-height: 1.4; }

/* ===== EDITOR (上部集約・焦茶ベゼル風ヘッダー) ===== */
#editor-screen {
  display: none; flex-direction: column;
  height: 100vh; position: fixed; inset: 0;
  background: var(--bg); z-index: 200;
}
#editor-screen.open { display: flex; }

/* 上部ツールバー */
.editor-toolbar {
  background: #352e28;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 64px;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  border-bottom: 2px solid var(--accent);
  z-index: 240;
}
.editor-title-container {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 4px 12px;
  border-radius: 6px;
}
.editor-title-input {
  background: none; border: none; color: #fff;
  font-size: 0.92rem; font-weight: 800; font-family: inherit;
  outline: none; text-align: left; width: 140px;
}
.toolbar-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ツールバー用ボタン） */
.toolbar-btn {
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.15);
  color: #fff;
  border-radius: 8px;
  width: 90px;
  height: 46px;
  cursor: pointer;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  font-family: inherit;
  transition: background 0.12s, border-color 0.12s;
  padding: 2px 0;
}
.toolbar-btn:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.3);
}
.toolbar-btn:disabled {
  opacity: 0.25;
  cursor: default;
}
.toolbar-btn .btn-symbol {
  font-size: 0.78rem;
  line-height: 1;
  color: #dcd5c9;
}
.toolbar-btn .btn-text {
  font-size: 0.72rem;
  font-weight: 900;
  line-height: 1.1;
}

.close-editor-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 8px;
  width: 80px;
  height: 46px;
  font-size: 0.82rem;
  font-weight: 900;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s;
}
.close-editor-btn:hover {
  background: #c0392b;
}

.canvas-wrap { 
  flex: 1; 
  overflow: auto; 
  position: relative; 
  touch-action: none;
}#editor-canvas {
  position: relative; 
  width: 3000px; 
  height: 2000px;
  background-color: var(--bg);
  background-image: 
    linear-gradient(rgba(208, 200, 184, 0.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(208, 200, 184, 0.4) 1px, transparent 1px);
  background-size: 40px 40px;
}
#lines-svg {
  position: absolute; inset: 0; pointer-events: none; width: 100%; height: 100%;
}

/* ===== NODES (学習ノート調カードデザイン) ===== */
.node {
  position: absolute; cursor: pointer; user-select: none;
  display: flex; flex-direction: column;
  touch-action: none;
}
.node-body {
  border: 2px solid var(--node-border);
  background: #ffffff; border-radius: 12px;
  min-width: 100%; min-height: 100%;
  flex: 1;
  display: flex; align-items: center; justify-content: flex-start;
  padding: 10px 14px; font-size: 0.92rem; text-align: left;
  word-break: break-all; line-height: 1.45; white-space: pre-wrap;
  box-shadow: 0 4px 12px var(--shadow);
  transition: border-color 0.12s, box-shadow 0.12s;
}
.node.selected > .node-body {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(168,32,32,0.22), 0 4px 14px var(--shadow);
}
/* center circle (webbing / mindmap) */
.node.type-center .node-body {
  border-radius: 50%;
  font-weight: 800; font-size: 1rem;
  background: var(--head-fill); padding: 0;
  justify-content: center; text-align: center;
  border-style: double; border-width: 4px;
}

/* jellyfish dome */
.node.type-jellyfish-dome > .node-body {
  border-radius: 110px 110px 14px 14px;
  background: #e6e0d5;
  border-color: var(--node-border);
  padding: 40px 16px 16px 16px;
  font-weight: 800;
  justify-content: center; text-align: center;
  border-style: double; border-width: 4px;
}

/* ===== RESIZER HANDLES ===== */
.resizer {
  position: absolute;
  background: transparent;
  z-index: 10;
}
.resizer-r  { top: 0; right: -5px; width: 10px; height: 100%; cursor: e-resize; }
.resizer-l  { top: 0; left: -5px; width: 10px; height: 100%; cursor: w-resize; }
.resizer-b  { bottom: -5px; left: 0; width: 100%; height: 10px; cursor: s-resize; }
.resizer-t  { top: -5px; left: 0; width: 100%; height: 10px; cursor: n-resize; }
.resizer-se { bottom: -6px; right: -6px; width: 14px; height: 14px; cursor: se-resize; z-index: 11; }

.node-actions {
  display: none; position: absolute;
  bottom: -34px; right: 0; gap: 5px;
}
.node.selected .node-actions { display: flex; }
.node-act-btn {
  height: 26px; border-radius: 13px; border: none; cursor: pointer;
  font-size: 0.75rem; font-family: inherit; font-weight: 700;
  padding: 0 10px; white-space: nowrap;
}
.btn-add-child { background: var(--green); color: #fff; }
.btn-del-node  { background: #c0b8b0; color: #3a3530; }
.btn-del-node.hidden { display: none; }

/* ===== TEXT MODAL ===== */
.text-modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(50,42,34,0.58); z-index: 600;
  align-items: center; justify-content: center;
}
.text-modal-overlay.open { display: flex; }
.text-modal {
  background: #fcfaf6; border-radius: 18px;
  padding: 26px 22px 20px; width: 520px; max-width: 95vw;
  box-shadow: 0 8px 40px rgba(0,0,0,0.24);
  border: 1.5px solid var(--border);
}
.tm-row { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; }
.tm-label { font-size: 0.83rem; font-weight: 700; min-width: 88px; line-height: 1.5; }
.toggle-grp { display: flex; gap: 5px; }
.tog-btn {
  border: 1.5px solid #bbb; background: #fff; border-radius: 8px;
  padding: 6px 16px; cursor: pointer; font-size: 0.83rem; font-family: inherit;
}
.tog-btn.active { background: #2a2520; color: #fff; border-color: #2a2520; }
.fsize-slider { flex: 1; accent-color: var(--accent); }
.tm-textarea {
  width: 100%; height: 120px; border: 1.5px solid #bbb; border-radius: 9px;
  padding: 10px 12px; font-size: 0.92rem; font-family: inherit; resize: vertical; background: #fff;
}
.tm-footer { display: flex; justify-content: space-between; margin-top: 14px; }
.btn-confirm {
  background: #2a2520; color: #fff; border: none; border-radius: 9px;
  padding: 9px 28px; font-size: 0.92rem; font-family: inherit; cursor: pointer; font-weight: 700;
}
.btn-cancel {
  background: #fff; color: #2a2520; border: 1.5px solid #bbb; border-radius: 9px;
  padding: 9px 28px; font-size: 0.92rem; font-family: inherit; cursor: pointer;
}

/* ===== COLOR PALETTE ===== */
.color-palette { display: flex; gap: 8px; align-items: center; }
.palette-btn {
  width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #bbb;
  cursor: pointer; transition: transform 0.1s, border-color 0.1s; outline: none;
}
.palette-btn:hover { transform: scale(1.15); }
.palette-btn.active { border-color: #2a2520; box-shadow: 0 0 0 2px #2a2520; }

/* save toast */
.save-toast {
  position: fixed; bottom: 20px; right: 20px;
  background: #2a2520; color: #fff; border-radius: 10px;
  padding: 10px 20px; font-size: 0.88rem; font-weight: 700;
  opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none;
}
.save-toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<div id="home-screen">
  <div class="home-header">
    <h1 class="home-title"><ruby>情<rt>じょう</rt>報<rt>ほう</rt>整<rt>せい</rt>理<rt>り</rt></ruby>ツール</h1>
  </div>
  
  <div class="btn-new-wrap">
    <button class="btn-new" onclick="openToolSelect()">
      <span><ruby>新<rt>あたら</rt></ruby>しく<ruby>作<rt>つく</rt></ruby>る</span>
      <span class="btn-new-plus">＋</span>
    </button>
  </div>

  <div class="saved-section">
    <div class="saved-title">
      <ruby>作<rt>さ</rt>業<rt>ぎょう</rt>履<rt>り</rt>歴<rt>れき</rt></ruby>
    </div>
    <div id="saved-grid" class="saved-grid"></div>
  </div>
</div>

<!-- ===== TOOL SELECT MODAL ===== -->
<div class="modal-overlay" id="tool-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeToolSelect()">✕</button>
    <div class="modal-title">
      <ruby>使<rt>し</rt>用<rt>よう</rt></ruby>するツールを<ruby>選<rt>せん</rt>択<rt>たく</rt></ruby>してください
    </div>
    <div class="tool-grid">

      <div class="tool-card" onclick="createNew('webbing')">
        <div class="tool-card-icon">
          <svg width="100" height="76" viewBox="0 0 100 76">
            <circle cx="50" cy="38" r="14" fill="none" stroke="#666" stroke-width="2.5"/>
            <rect x="2"  y="2"  width="22" height="14" rx="4" fill="none" stroke="#666" stroke-width="2"/>
            <rect x="76" y="2"  width="22" height="14" rx="4" fill="none" stroke="#666" stroke-width="2"/>
            <rect x="2"  y="60" width="22" height="14" rx="4" fill="none" stroke="#666" stroke-width="2"/>
            <rect x="76" y="60" width="22" height="14" rx="4" fill="none" stroke="#666" stroke-width="2"/>
            <line x1="36" y1="30" x2="24" y2="9"  stroke="#666" stroke-width="1.5"/>
            <line x1="64" y1="30" x2="76" y2="9"  stroke="#666" stroke-width="1.5"/>
            <line x1="36" y1="46" x2="24" y2="67" stroke="#666" stroke-width="1.5"/>
            <line x1="64" y1="46" x2="76" y2="67" stroke="#666" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="tool-card-name">ウェビングマップ</div>
      </div>

      <div class="tool-card" onclick="createNew('mindmap')">
        <div class="tool-card-icon">
          <svg width="100" height="76" viewBox="0 0 100 76">
            <circle cx="28" cy="38" r="16" fill="none" stroke="#666" stroke-width="2.5"/>
            <rect x="54" y="6"  width="38" height="13" rx="4" fill="none" stroke="#666" stroke-width="1.8"/>
            <rect x="54" y="24" width="38" height="13" rx="4" fill="none" stroke="#666" stroke-width="1.8"/>
            <rect x="54" y="42" width="38" height="13" rx="4" fill="none" stroke="#666" stroke-width="1.8"/>
            <rect x="54" y="60" width="38" height="13" rx="4" fill="none" stroke="#666" stroke-width="1.8"/>
            <line x1="44" y1="30" x2="54" y2="12" stroke="#666" stroke-width="1.5"/>
            <line x1="44" y1="35" x2="54" y2="30" stroke="#666" stroke-width="1.5"/>
            <line x1="44" y1="41" x2="54" y2="48" stroke="#666" stroke-width="1.5"/>
            <line x1="44" y1="46" x2="54" y2="66" stroke="#666" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="tool-card-name">マインドマップ</div>
      </div>

      <div class="tool-card" onclick="createNew('jellyfish')">
        <div class="tool-card-icon">
          <svg width="100" height="76" viewBox="0 0 100 76">
            <path d="M10,42 Q50,4 90,42" fill="#c8c0b0" stroke="#666" stroke-width="2"/>
            <line x1="22" y1="42" x2="16" y2="66" stroke="#666" stroke-width="2"/>
            <line x1="50" y1="42" x2="50" y2="66" stroke="#666" stroke-width="2"/>
            <line x1="78" y1="42" x2="84" y2="66" stroke="#666" stroke-width="2"/>
            <rect x="4"  y="60" width="22" height="14" rx="4" fill="none" stroke="#666" stroke-width="1.8"/>
            <rect x="39" y="60" width="22" height="14" rx="4" fill="none" stroke="#666" stroke-width="1.8"/>
            <rect x="74" y="60" width="22" height="14" rx="4" fill="none" stroke="#666" stroke-width="1.8"/>
          </svg>
        </div>
        <div class="tool-card-name">クラゲチャート</div>
      </div>

    </div>
  </div>
</div>

<!-- ===== EDITOR ===== -->
<div id="editor-screen">
  
  <div class="editor-toolbar">
    <!-- タイトル編集部 -->
    <div class="editor-title-container">
      <input id="editor-title" class="editor-title-input" value="無題" oninput="scheduleAutoSave()"/>
    </div>

    <!-- 統合アクション群 -->
    <div class="toolbar-actions">
      <!-- 戻る (Undo) -->
      <button class="toolbar-btn" id="btn-undo" onclick="undo()" disabled>
        <span class="btn-symbol">◀</span>
        <span class="btn-text"><ruby>戻<rt>もど</rt></ruby>る</span>
      </button>
      <!-- 進む (Redo) -->
      <button class="toolbar-btn" id="btn-redo" onclick="redo()" disabled>
        <span class="btn-symbol">▶</span>
        <span class="btn-text"><ruby>進<rt>すす</rt></ruby>む</span>
      </button>
      <!-- 拡大 -->
      <button class="toolbar-btn" onclick="changeZoom(+0.15)">
        <span class="btn-symbol">＋</span>
        <span class="btn-text"><ruby>拡<rt>かく</rt>大<rt>だい</rt></ruby></span>
      </button>
      <!-- もどす -->
      <button class="toolbar-btn" onclick="resetZoom()">
        <span class="btn-symbol">⟲</span>
        <span class="btn-text"><ruby>戻<rt>もど</rt></ruby>す</span>
      </button>
      <!-- 縮小 -->
      <button class="toolbar-btn" onclick="changeZoom(-0.15)">
        <span class="btn-symbol">－</span>
        <span class="btn-text"><ruby>縮<rt>しゅく</rt>小<rt>しょう</rt></ruby></span>
      </button>
      <!-- 記録 -->
      <button class="toolbar-btn" onclick="manualSave()">
        <span class="btn-symbol">▼</span>
        <span class="btn-text"><ruby>記<rt>き</rt>録<rt>ろく</rt></ruby></span>
      </button>
    </div>

    <!-- おわる -->
    <button class="close-editor-btn" onclick="closeEditor()">
      <span>おわる</span>
    </button>
  </div>

  <!-- キャンバス領域 -->
  <div class="canvas-wrap" id="canvas-wrap">
    <div id="editor-canvas">
      <svg id="lines-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

</div>

<!-- ===== TEXT EDIT MODAL ===== -->
<div class="text-modal-overlay" id="text-modal">
  <div class="text-modal">
    <div class="tm-row">
      <span class="tm-label"><ruby>向<rt>む</rt></ruby>き</span>
      <div class="toggle-grp">
        <button class="tog-btn" id="dir-tate" onclick="setDir('tate')">たて<ruby>書<rt>が</rt></ruby>き</button>
        <button class="tog-btn active" id="dir-yoko" onclick="setDir('yoko')">よこ<ruby>書<rt>が</rt></ruby>き</button>
      </div>
    </div>
    <div class="tm-row">
      <span class="tm-label"><ruby>文<rt>も</rt>字<rt>じ</rt></ruby>の<ruby>大<rt>おお</rt></ruby>きさ</span>
      <input type="range" class="fsize-slider" id="font-size-slider" min="10" max="28" value="14">
    </div>
    <div class="tm-row">
      <span class="tm-label"><ruby>文<rt>も</rt>字<rt>じ</rt></ruby>の<ruby>太<rt>ふと</rt></ruby>さ</span>
      <div class="toggle-grp">
        <button class="tog-btn active" id="weight-normal" onclick="setWeight('normal')">ふつう</button>
        <button class="tog-btn" id="weight-bold" onclick="setWeight('bold')"><ruby>太<rt>ふと</rt>字<rt>じ</rt></ruby></button>
      </div>
    </div>
    <div class="tm-row">
      <span class="tm-label"><ruby>文<rt>も</rt>字<rt>じ</rt></ruby>の<ruby>色<rt>いろ</rt></ruby></span>
      <div class="color-palette" id="text-color-palette"></div>
    </div>
    <div class="tm-row">
      <span class="tm-label"><ruby>背<rt>はい</rt>景<rt>けい</rt></ruby>の<ruby>色<rt>いろ</rt></ruby></span>
      <div class="color-palette" id="bg-color-palette"></div>
    </div>
    <textarea class="tm-textarea" id="node-text-input" placeholder="テキストをにゅうりょくしてください"></textarea>
    <div class="tm-footer">
      <button class="btn-confirm" onclick="confirmNodeText()">けってい</button>
      <button class="btn-cancel"  onclick="cancelNodeText()">やめる</button>
    </div>
  </div>
</div>

<div class="save-toast" id="save-toast"><ruby>保<rt>ほ</rt>存<rt>ぞん</rt></ruby>しました</div>

<script>
// ============================================================
// CONFIGURATION DRIVEN SETTINGS
// ============================================================
const USER_SETTINGS = {
  CANVAS_WIDTH: 3000,
  CANVAS_HEIGHT: 2000,
  ZOOM_MIN: 0.25,
  ZOOM_MAX: 3.0,
  ZOOM_STEP: 0.15,
  AUTO_SAVE_DELAY: 1200,
  TOAST_DURATION: 1800,
  LOCAL_STORAGE_KEY: 'thinking_v3_saved',

  PALETTE_TEXT_COLORS: ['#2a2520', '#a82020', '#1a5276', '#196f3d', '#b7950b', '#626567', '#ffffff'],
  PALETTE_BG_COLORS: ['#ffffff', '#fcfaf2', '#fdedec', '#ebf5fb', '#eaf2f8', '#eafaf1', '#fef9e7']
};

// ============================================================
// APP CLASS DEFINITION
// ============================================================
class ThinkingToolApp {
  constructor() {
    this.nodes = [];
    this.edges = [];
    this.currentTool = null;
    this.currentProjId = null;
    this.zoomLevel = 1.0;
    this.idCounter = 1;
    this.selectedId = null;
    this.editingId = null;

    this.undoStack = [];
    this.redoStack = [];
    this.autoSaveTimer = null;
    this.rootNodeIds = new Set();

    this.selectedTextColor = '#2a2520';
    this.selectedBgColor = '#ffffff';

    this.init();
  }

  // 初期セットアップ
  init() {
    this.renderPalettes();
    this.renderSaved();
    this.setupGlobalClick();
    this.setupBackgroundPan();
  }

  // ID生成ヘルパー
  uid() {
    return 'n' + (this.idCounter++);
  }

  // ============================================================
  // SNAPSHOT & HISTORY (Undo/Redo)
  // ============================================================
  snapshot() {
    this.undoStack.push(JSON.stringify({ nodes: this.nodes, edges: this.edges }));
    if (this.undoStack.length > 60) this.undoStack.shift();
    this.redoStack = [];
    this.updateUndoRedoBtns();
    this.scheduleAutoSave();
  }

  undo() {
    if (!this.undoStack.length) return;
    this.redoStack.push(JSON.stringify({ nodes: this.nodes, edges: this.edges }));
    const s = JSON.parse(this.undoStack.pop());
    this.nodes = s.nodes;
    this.edges = s.edges;
    this.updateUndoRedoBtns();
    this.renderCanvas();
    this.scheduleAutoSave();
  }

  redo() {
    if (!this.redoStack.length) return;
    this.undoStack.push(JSON.stringify({ nodes: this.nodes, edges: this.edges }));
    const s = JSON.parse(this.redoStack.pop());
    this.nodes = s.nodes;
    this.edges = s.edges;
    this.updateUndoRedoBtns();
    this.renderCanvas();
    this.scheduleAutoSave();
  }

  updateUndoRedoBtns() {
    document.getElementById('btn-undo').disabled = this.undoStack.length === 0;
    document.getElementById('btn-redo').disabled = this.redoStack.length === 0;
  }

  // ============================================================
  // SAVE / LOAD SYSTEM
  // ============================================================
  scheduleAutoSave() {
    clearTimeout(this.autoSaveTimer);
    this.autoSaveTimer = setTimeout(() => this.doSave(), USER_SETTINGS.AUTO_SAVE_DELAY);
  }

  manualSave() {
    this.doSave();
    this.showToast();
  }

  doSave() {
    if (!this.currentProjId) return;
    const title = document.getElementById('editor-title').value || '無題';
    const date = this.nowStr();
    let arr = this.getSaved();
    const idx = arr.findIndex(p => p.id === this.currentProjId);
    const proj = {
      id: this.currentProjId,
      title,
      date,
      tool: this.currentTool,
      nodes: this.nodes,
      edges: this.edges,
      idCounter: this.idCounter,
      roots: [...this.rootNodeIds]
    };
    if (idx >= 0) arr[idx] = proj;
    else arr.push(proj);
    this.setSaved(arr);
  }

  showToast() {
    const t = document.getElementById('save-toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), USER_SETTINGS.TOAST_DURATION);
  }

  nowStr() {
    const d = new Date();
    return `${d.getFullYear()}/${this.pad(d.getMonth() + 1)}/${this.pad(d.getDate())} ${this.pad(d.getHours())}:${this.pad(d.getMinutes())}`;
  }

  pad(n) {
    return String(n).padStart(2, '0');
  }

  getSaved() {
    try {
      return JSON.parse(localStorage.getItem(USER_SETTINGS.LOCAL_STORAGE_KEY) || '[]');
    } catch {
      return [];
    }
  }

  setSaved(arr) {
    localStorage.setItem(USER_SETTINGS.LOCAL_STORAGE_KEY, JSON.stringify(arr));
  }

  deleteProject(id) {
    this.setSaved(this.getSaved().filter(p => p.id !== id));
    this.renderSaved();
  }

  // ============================================================
  // HOME PORTAL RENDER
  // ============================================================
  renderSaved() {
    const grid = document.getElementById('saved-grid');
    const arr = this.getSaved().slice().reverse();
    if (!arr.length) {
      grid.innerHTML = '<p class="empty-saved">まだ<ruby>作<rt>さく</rt>成<rt>せい</rt></ruby>したツールはありません</p>';
      return;
    }
    grid.innerHTML = arr.map(p => `
      <div class="saved-card" onclick="loadProject('${p.id}')">
        <div class="saved-card-label">${this.esc(p.title)}</div>
        <!-- 更新 ➜ 更・新 にモノルビ化 -->
        <div class="saved-card-date">${this.esc(p.date)}<ruby>更<rt>こう</rt>新<rt>しん</rt></ruby></div>
        <div class="saved-card-thumb">
          ${this.thumbIcon(p.tool)}
          <!-- 削除 ➜ 削・除 にモノルビ化 -->
          <button class="saved-card-del" onclick="event.stopPropagation();deleteProject('${p.id}')"><ruby>削<rt>さく</rt>除<rt>じょ</rt></ruby></button>
        </div>
      </div>`).join('');
  }

  esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  thumbIcon(t) {
    const map = {
      webbing:   `<svg width="60" height="50"><circle cx="30" cy="22" r="9" fill="none" stroke="#aaa" stroke-width="2"/><rect x="2" y="34" width="14" height="9" rx="2" fill="none" stroke="#aaa" stroke-width="1.5"/><rect x="23" y="34" width="14" height="9" rx="2" fill="none" stroke="#aaa" stroke-width="1.5"/><rect x="44" y="34" width="14" height="9" rx="2" fill="none" stroke="#aaa" stroke-width="1.5"/><line x1="9" y1="34" x2="22" y2="31" stroke="#aaa" stroke-width="1.2"/><line x1="30" y1="31" x2="30" y2="34" stroke="#aaa" stroke-width="1.2"/><line x1="51" y1="34" x2="38" y2="31" stroke="#aaa" stroke-width="1.2"/></svg>`,
      mindmap:   `<svg width="60" height="50"><circle cx="16" cy="25" r="9" fill="none" stroke="#aaa" stroke-width="2"/><rect x="32" y="5"  width="24" height="9" rx="2" fill="none" stroke="#aaa" stroke-width="1.5"/><rect x="32" y="18" width="24" height="9" rx="2" fill="none" stroke="#aaa" stroke-width="1.5"/><rect x="32" y="31" width="24" height="9" rx="2" fill="none" stroke="#aaa" stroke-width="1.5"/><line x1="25" y1="20" x2="32" y2="9"  stroke="#aaa" stroke-width="1.2"/><line x1="25" y1="25" x2="32" y2="22" stroke="#aaa" stroke-width="1.2"/><line x1="25" y1="30" x2="32" y2="35" stroke="#aaa" stroke-width="1.2"/></svg>`,
      jellyfish: `<svg width="60" height="50"><path d="M6,26 Q30,6 54,26" fill="#bbb" stroke="#999" stroke-width="1.5"/><line x1="14" y1="26" x2="10" y2="42" stroke="#aaa" stroke-width="1.5"/><line x1="30" y1="26" x2="30" y2="42" stroke="#aaa" stroke-width="1.5"/><line x1="46" y1="26" x2="50" y2="42" stroke="#aaa" stroke-width="1.5"/><rect x="2"  y="40" width="16" height="9" rx="2" fill="none" stroke="#aaa" stroke-width="1.5"/><rect x="22" y="40" width="16" height="9" rx="2" fill="none" stroke="#aaa" stroke-width="1.5"/><rect x="42" y="40" width="16" height="9" rx="2" fill="none" stroke="#aaa" stroke-width="1.5"/></svg>`,
    };
    return map[t] || '';
  }

  loadProject(id) {
    const p = this.getSaved().find(x => x.id === id);
    if (!p) return;
    this.currentProjId = p.id;
    this.currentTool   = p.tool;
    this.nodes         = p.nodes;
    this.edges         = p.edges;
    this.idCounter     = p.idCounter || 100;
    this.rootNodeIds   = new Set(p.roots || []);
    this.undoStack = [];
    this.redoStack = [];
    document.getElementById('editor-title').value = p.title || '無題';
    this.openEditor();
    this.renderCanvas();
    this.scrollToCenter();
    this.updateUndoRedoBtns();
  }

  // ============================================================
  // PORTAL ACTIONS
  // ============================================================
  openToolSelect() {
    document.getElementById('tool-modal').classList.add('open');
  }

  closeToolSelect() {
    document.getElementById('tool-modal').classList.remove('open');
  }

  openToolSelectFromEditor() {
    this.closeEditor();
    this.openToolSelect();
  }

  createNew(tool) {
    this.closeToolSelect();
    this.currentTool   = tool;
    this.currentProjId = 'proj_' + Date.now();
    this.nodes = [];
    this.edges = [];
    this.idCounter = 1;
    this.rootNodeIds = new Set();
    this.undoStack = [];
    this.redoStack = [];
    document.getElementById('editor-title').value = this.toolLabel(tool);
    this.buildLayout(tool);
    this.openEditor();
    this.renderCanvas();
    this.scrollToCenter();
    this.updateUndoRedoBtns();
    this.doSave();
  }

  toolLabel(t) {
    return { webbing: 'ウェビングマップ', mindmap: 'マインドマップ', jellyfish: 'クラゲチャート' }[t] || t;
  }

// ============================================================
  // CANVAS LAYOUT GENERATORS
  // ============================================================
buildLayout(tool) {
    const cx = 900, cy = 700;
    if (tool === 'webbing') {
      const center = this.mk(cx - 60, cy - 60, '', 'center');
      this.rootNodeIds.add(center.id);
      const angles = [225, 315, 45, 135];
      const r = 280;
      angles.forEach(a => {
        const rad = a * Math.PI / 180;
        const n = this.mk(cx + r * Math.cos(rad) - 75, cy + r * Math.sin(rad) - 24, '', 'branch');
        this.edges.push({ from: center.id, to: n.id });
      });

    } else if (tool === 'mindmap') {
      const center = this.mk(cx - 200, cy, '', 'center');
      this.rootNodeIds.add(center.id);
      const rightY = [cy - 240, cy - 120, cy, cy + 120, cy + 240];
      rightY.forEach(y => {
        const n = this.mk(cx + 160, y - 24, '', 'branch');
        this.edges.push({ from: center.id, to: n.id });
      });

    } else if (tool === 'jellyfish') {
      const dome = this.mk(cx - 110, cy - 280, '', 'jellyfish-dome');
      this.rootNodeIds.add(dome.id);
      const xs = [cx - 440, cx - 220, cx, cx + 220, cx + 440];
      xs.forEach(x => {
        const n = this.mk(x - 75, cy + 60, '', 'branch');
        this.edges.push({ from: dome.id, to: n.id });
      });
    }
  }

  mk(x, y, text, type) {
    const defaultWidth = type === 'jellyfish-dome' ? 220 : (type === 'center' ? 120 : 150);
    const defaultHeight = type === 'center' ? 120 : 48;
    const n = {
      id: this.uid(), x, y, text, type,
      fontSize: 14, fontWeight: 'normal',
      color: '#2a2520', bg: '#ffffff', dir: 'yoko',
      width: defaultWidth,
      height: defaultHeight
    };
    this.nodes.push(n);
    return n;
  }

  // ============================================================
  // EDITOR VIEWPORT CONTROL
  // ============================================================
  openEditor() {
    document.getElementById('editor-screen').classList.add('open');
    document.getElementById('home-screen').style.display = 'none';
    this.zoomLevel = 1.0;
    this.applyZoom();
  }

  closeEditor() {
    this.doSave();
    document.getElementById('editor-screen').classList.remove('open');
    document.getElementById('home-screen').style.display = 'block';
    this.selectedId = null;
    this.renderSaved();
  }

  scrollToCenter() {
    const wrap = document.getElementById('canvas-wrap');
    if (!wrap) return;

    const doScroll = () => {
      let targetX = USER_SETTINGS.CANVAS_WIDTH / 2;
      let targetY = USER_SETTINGS.CANVAS_HEIGHT / 2;

      const rootId = [...this.rootNodeIds][0];
      const rootNode = this.nodes.find(n => n.id === rootId);
      if (rootNode) {
        if (rootNode.type === 'jellyfish-dome') {
          targetX = rootNode.x + 110;
          targetY = rootNode.y + 80;
        } else if (rootNode.type === 'center') {
          targetX = rootNode.x + 60;
          targetY = rootNode.y + 60;
        } else {
          targetX = rootNode.x + (rootNode.width / 2);
          targetY = rootNode.y + 24;
        }
      }

      const wrapWidth = wrap.clientWidth || window.innerWidth;
      const wrapHeight = wrap.clientHeight || window.innerHeight;

      let ratioX = 0.5;
      let ratioY = 0.5;

      if (this.currentTool === 'mindmap') {
        ratioX = 0.15;
      } else if (this.currentTool === 'jellyfish') {
        ratioY = 0.15;
      }

      wrap.scrollLeft = (targetX * this.zoomLevel) - (wrapWidth * ratioX);
      wrap.scrollTop = (targetY * this.zoomLevel) - (wrapHeight * ratioY);
    };

    if (wrap.clientWidth === 0) {
      requestAnimationFrame(() => {
        requestAnimationFrame(doScroll);
      });
    } else {
      doScroll();
    }
  }

  changeZoom(d) {
    this.zoomLevel = Math.max(USER_SETTINGS.ZOOM_MIN, Math.min(USER_SETTINGS.ZOOM_MAX, this.zoomLevel + d));
    this.applyZoom();
  }

  resetZoom() {
    this.zoomLevel = 1.0;
    this.applyZoom();
  }

  applyZoom() {
    const canvas = document.getElementById('editor-canvas');
    if (!canvas) return;

    let originX = USER_SETTINGS.CANVAS_WIDTH / 2;
    let originY = USER_SETTINGS.CANVAS_HEIGHT / 2;

    const rootId = [...this.rootNodeIds][0];
    const rootNode = this.nodes.find(n => n.id === rootId);
    if (rootNode) {
      if (rootNode.type === 'jellyfish-dome') {
        originX = rootNode.x + 110;
        originY = rootNode.y + 80;
      } else if (rootNode.type === 'center') {
        originX = rootNode.x + 60;
        originY = rootNode.y + 60;
      } else {
        originX = rootNode.x + (rootNode.width / 2);
        originY = rootNode.y + 24;
      }
    }

    canvas.style.transformOrigin = `${originX}px ${originY}px`;
    canvas.style.transform = `scale(${this.zoomLevel})`;
  }

  // ============================================================
  // CANVAS DRAWING & NODES
  // ============================================================
  renderCanvas() {
    const canvas = document.getElementById('editor-canvas');
    canvas.querySelectorAll('.node').forEach(el => el.remove());
    this.nodes.forEach(n => canvas.appendChild(this.makeNodeEl(n)));
    this.drawLines();
  }

  makeNodeEl(n) {
    const wrap = document.createElement('div');
    wrap.className = 'node' + (n.type === 'center' ? ' type-center' : '') + (n.type === 'jellyfish-dome' ? ' type-jellyfish-dome' : '');
    wrap.id = 'node-' + n.id;
    wrap.style.cssText = `left:${n.x}px;top:${n.y}px;position:absolute;width:${n.width}px;min-height:${n.height}px;`;

    // Body
    const body = document.createElement('div');
    body.className = 'node-body';
    body.style.width = '100%';
    this.applyBodyStyle(body, n);

    body.textContent = n.text || '';
    if (n.dir === 'tate') body.style.writingMode = 'vertical-rl';

    const resizerTypes = ['r', 'l', 'b', 't', 'se'];
    resizerTypes.forEach(type => {
      const resizer = document.createElement('div');
      resizer.className = `resizer resizer-${type}`;
      wrap.appendChild(resizer);
      this.makeResizable(wrap, resizer, n, type);
    });

    const actions = document.createElement('div');
    actions.className = 'node-actions';

    const addBtn = document.createElement('button');
    addBtn.className = 'node-act-btn btn-add-child';
    addBtn.textContent = '＋';
    addBtn.onclick = e => { e.stopPropagation(); this.addChild(n.id); };

    const delBtn = document.createElement('button');
    delBtn.className = 'node-act-btn btn-del-node';
    delBtn.innerHTML = '<ruby>削<rt>さく</rt>除<rt>じょ</rt></ruby>';
    const isRoot = this.rootNodeIds.has(n.id);
    if (isRoot) delBtn.classList.add('hidden');
    else delBtn.onclick = e => { e.stopPropagation(); this.deleteNode(n.id); };

    actions.appendChild(addBtn);
    actions.appendChild(delBtn);
    wrap.appendChild(body);
    wrap.appendChild(actions);

    wrap.addEventListener('click',    e => { e.stopPropagation(); this.selectNode(n.id); });
    wrap.addEventListener('dblclick', e => { e.stopPropagation(); this.openTextModal(n.id); });
    this.makeDraggable(wrap, n);
    return wrap;
  }

  applyBodyStyle(el, n) {
    el.style.fontSize   = (n.fontSize || 14) + 'px';
    el.style.fontWeight = n.fontWeight || 'normal';
    el.style.color      = n.color || '#2a2520';
    el.style.background = n.bg || '#ffffff';
    if (n.dir === 'tate') el.style.writingMode = 'vertical-rl';
    else el.style.writingMode = 'horizontal-tb';
  }

  // ============================================================
  // CONNECTOR LINES
  // ============================================================
  nodeCenter(n) {
    const el = document.getElementById('node-' + n.id);
    if (!el) return { x: n.x + (n.width / 2), y: n.y + (n.height / 2) };
    return { x: n.x + el.offsetWidth / 2, y: n.y + el.offsetHeight / 2 };
  }

  setupBackgroundPan() {
    const wrap = document.getElementById('canvas-wrap');
    if (!wrap) return;

    let isPanning = false;
    let startX, startY;
    let scrollLeft, scrollTop;

    const onStart = (cx, cy, target) => {
      if (
        target.closest('.node') || 
        target.closest('button') || 
        target.closest('input') || 
        target.closest('textarea') || 
        target.closest('path')
      ) {
        return;
      }
      isPanning = true;
      wrap.style.cursor = 'grabbing';
      startX = cx;
      startY = cy;
      scrollLeft = wrap.scrollLeft;
      scrollTop = wrap.scrollTop;
    };

    const onMove = (cx, cy) => {
      if (!isPanning) return;
      const dx = cx - startX;
      const dy = cy - startY;
      wrap.scrollLeft = scrollLeft - dx;
      wrap.scrollTop = scrollTop - dy;
    };

    const onEnd = () => {
      if (isPanning) {
        isPanning = false;
        wrap.style.cursor = 'auto';
      }
    };

    wrap.addEventListener('mousedown', e => onStart(e.clientX, e.clientY, e.target));
    document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    document.addEventListener('mouseup', onEnd);

    wrap.addEventListener('touchstart', e => {
      const t = e.touches[0];
      onStart(t.clientX, t.clientY, e.target);
    }, { passive: true });
    document.addEventListener('touchmove', e => {
      const t = e.touches[0];
      onMove(t.clientX, t.clientY);
    }, { passive: true });
    document.addEventListener('touchend', onEnd);
  }

  drawLines() {
    const svg = document.getElementById('lines-svg');
    svg.innerHTML = '';
    this.edges.forEach(e => {
      const from = this.nodes.find(n => n.id === e.from);
      const to   = this.nodes.find(n => n.id === e.to);
      if (!from || !to) return;
      const fc = this.nodeCenter(from);
      const tc = this.nodeCenter(to);

      if (e.curveness === undefined) e.curveness = 0;

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      let d = '';

      if (e.curveness === 0) {
        // 直線パス
        d = `M ${fc.x} ${fc.y} L ${tc.x} ${tc.y}`;
      } else {
        // 二次ベジェ曲線パス（中点から法線方向に curveness オフセットした制御点を計算）
        const mx = (fc.x + tc.x) / 2;
        const my = (fc.y + tc.y) / 2;
        const dx = tc.x - fc.x;
        const dy = tc.y - fc.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const nx = -dy / len; // 垂直法線ベクトル
        const ny = dx / len;
        const cx = mx + nx * e.curveness; // 制御点のX座標
        const cy = my + ny * e.curveness; // 制御点のY座標
        d = `M ${fc.x} ${fc.y} Q ${cx} ${cy} ${tc.x} ${tc.y}`;
      }

      const visualPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      visualPath.setAttribute('d', d);
      visualPath.setAttribute('stroke', '#b0a898');
      visualPath.setAttribute('stroke-width', '2.5');
      visualPath.setAttribute('fill', 'none');

      const hitPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      hitPath.setAttribute('d', d);
      hitPath.setAttribute('stroke', 'transparent');
      hitPath.setAttribute('stroke-width', '16');
      hitPath.setAttribute('fill', 'none');
      hitPath.style.cursor = 'ns-resize';

      g.appendChild(visualPath);
      g.appendChild(hitPath);
      svg.appendChild(g);

      this.makeLineBendable(hitPath, e, fc, tc);
    });
  }

  makeLineBendable(pathEl, edge, fc, tc) {
    let dragging = false;

    const onStart = () => {
      dragging = true;
      this.snapshot();
    };

    const onMove = (cx, cy) => {
      if (!dragging) return;
      const rect = document.getElementById('editor-canvas').getBoundingClientRect();
      const mx = (cx - rect.left) / this.zoomLevel;
      const my = (cy - rect.top) / this.zoomLevel;

      const dx = tc.x - fc.x;
      const dy = tc.y - fc.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const nx = -dy / len;
      const ny = dx / len;

      const amx = mx - fc.x;
      const amy = my - fc.y;

      const projDist = amx * nx + amy * ny;
      edge.curveness = projDist * 1.35;

      if (Math.abs(edge.curveness) < 8) {
        edge.curveness = 0;
      }

      this.drawLines();
    };

    const onEnd = () => {
      if (dragging) {
        dragging = false;
        this.scheduleAutoSave();
      }
    };

    pathEl.addEventListener('mousedown', e => {
      e.stopPropagation();
      onStart();
    });
    document.addEventListener('mousemove', e => {
      if (dragging) onMove(e.clientX, e.clientY);
    });
    document.addEventListener('mouseup', onEnd);

    pathEl.addEventListener('touchstart', e => {
      e.stopPropagation();
      onStart();
    }, { passive: false });
    document.addEventListener('touchmove', e => {
      if (dragging) {
        const t = e.touches[0];
        onMove(t.clientX, t.clientY);
      }
    }, { passive: true });
    document.addEventListener('touchend', onEnd);
  }

  // ============================================================
  // NODE OPERATION ACTIONS
  // ============================================================
  selectNode(id) {
    this.selectedId = id;
    document.querySelectorAll('.node').forEach(el => el.classList.remove('selected'));
    const el = document.getElementById('node-' + id);
    if (el) el.classList.add('selected');
  }

  setupGlobalClick() {
    document.addEventListener('click', e => {
      if (!e.target.closest('.node') && !e.target.closest('.text-modal')) {
        this.selectedId = null;
        document.querySelectorAll('.node').forEach(el => el.classList.remove('selected'));
      }
    });
  }

  addChild(parentId) {
    this.snapshot();
    const parent = this.nodes.find(n => n.id === parentId);
    if (!parent) return;
    const child = this.mk(parent.x + 240, parent.y + 70, '', 'branch');
    this.edges.push({ from: parentId, to: child.id });
    const canvas = document.getElementById('editor-canvas');
    canvas.appendChild(this.makeNodeEl(child));
    this.drawLines();
    this.selectNode(child.id);
  }

  deleteNode(id) {
    if (this.rootNodeIds.has(id)) return;
    this.snapshot();
    const toRemove = this.collectDescendants(id);
    toRemove.forEach(rid => {
      this.nodes = this.nodes.filter(n => n.id !== rid);
      this.edges = this.edges.filter(e => e.from !== rid && e.to !== rid);
      const el = document.getElementById('node-' + rid);
      if (el) el.remove();
    });
    this.drawLines();
  }

  collectDescendants(id) {
    const result = [id];
    const children = this.edges.filter(e => e.from === id).map(e => e.to);
    children.forEach(cid => result.push(...this.collectDescendants(cid)));
    return result;
  }

  // ============================================================
  // DRAGGABLE CONTROLLER (枠以外の部分をつかんだときのドラッグ)
  // ============================================================
  makeDraggable(el, n) {
    let sx, sy, snx, sny, dragging = false, moved = false;

    const startDrag = (cx, cy) => {
      sx = cx; sy = cy; snx = n.x; sny = n.y;
      dragging = true; moved = false;
    };
    const moveDrag = (cx, cy) => {
      if (!dragging) return;
      const dx = (cx - sx) / this.zoomLevel;
      const dy = (cy - sy) / this.zoomLevel;
      if (!moved && Math.abs(dx) + Math.abs(dy) > 3) { this.snapshot(); moved = true; }
      n.x = snx + dx; n.y = sny + dy;
      el.style.left = n.x + 'px'; el.style.top = n.y + 'px';
      this.drawLines();
    };
    const endDrag = () => { dragging = false; };

    el.addEventListener('mousedown', e => { if (e.target.tagName !== 'BUTTON' && !e.target.classList.contains('resizer')) { startDrag(e.clientX, e.clientY); e.preventDefault(); } });
    document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
    document.addEventListener('mouseup', endDrag);

    el.addEventListener('touchstart', e => {
      if (e.target.tagName !== 'BUTTON' && !e.target.classList.contains('resizer')) {
        e.stopPropagation();
        e.preventDefault();
        const t = e.touches[0];
        startDrag(t.clientX, t.clientY);
      }
    }, {passive: false});

    document.addEventListener('touchmove', e => {
      if (dragging) {
        e.preventDefault();
        const t = e.touches[0];
        moveDrag(t.clientX, t.clientY);
      }
    }, {passive: false});
    
    document.addEventListener('touchend', endDrag);
  }

  // ============================================================
  // RESIZABLE CONTROLLER (上下左右の4辺および右下枠ドラッグ)
  // ============================================================
  makeResizable(el, handle, n, type) {
    let sx, sy, sw, sh, snx, sny, resizing = false, resized = false;

    const startResize = (cx, cy) => {
      sx = cx;
      sy = cy;
      sw = n.width || el.offsetWidth;
      sh = n.height || el.offsetHeight;
      snx = n.x;
      sny = n.y;
      resizing = true;
      resized = false;
    };
    const moveResize = (cx, cy) => {
      if (!resizing) return;
      const dx = (cx - sx) / this.zoomLevel;
      const dy = (cy - sy) / this.zoomLevel;

      if (!resized && (Math.abs(dx) > 1 || Math.abs(dy) > 1)) {
        this.snapshot();
        resized = true;
      }

      if (type === 'r' || type === 'se') {
        n.width = Math.max(80, sw + dx);
      }
      if (type === 'l') {
        const targetWidth = sw - dx;
        if (targetWidth > 80) {
          n.width = targetWidth;
          n.x = snx + dx;
        }
      }
      if (type === 'b' || type === 'se') {
        n.height = Math.max(40, sh + dy);
      }
      if (type === 't') {
        const targetHeight = sh - dy;
        if (targetHeight > 40) {
          n.height = targetHeight;
          n.y = sny + dy;
        }
      }

      el.style.width = n.width + 'px';
      el.style.minHeight = n.height + 'px';
      el.style.left = n.x + 'px';
      el.style.top = n.y + 'px';
      this.drawLines();
    };
    const endResize = () => {
      if (resizing) {
        resizing = false;
        if (resized) {
          this.scheduleAutoSave();
        }
      }
    };

    handle.addEventListener('mousedown', e => {
      e.stopPropagation();
      e.preventDefault();
      startResize(e.clientX, e.clientY);
    });
    document.addEventListener('mousemove', e => { if (resizing) moveResize(e.clientX, e.clientY); });
    document.addEventListener('mouseup', endResize);

    handle.addEventListener('touchstart', e => {
      e.stopPropagation();
      e.preventDefault();
      const t = e.touches[0];
      startResize(t.clientX, t.clientY);
    }, {passive: false});

    document.addEventListener('touchmove', e => {
      if (resizing) {
        e.preventDefault();
        const t = e.touches[0];
        moveResize(t.clientX, t.clientY);
      }
    }, {passive: false});

    document.addEventListener('touchend', endResize);
  }

  // ============================================================
  // TEXT MODAL CONTROL
  // ============================================================
  openTextModal(nodeId) {
    this.editingId = nodeId;
    const n = this.nodes.find(x => x.id === nodeId);
    if (!n) return;
    document.getElementById('node-text-input').value  = n.text || '';
    document.getElementById('font-size-slider').value = n.fontSize || 14;

    this.selectPaletteColor('text', n.color || '#2a2520');
    this.selectPaletteColor('bg', n.bg || '#ffffff');

    this.setDir(n.dir || 'yoko');
    this.setWeight(n.fontWeight || 'normal');
    document.getElementById('text-modal').classList.add('open');
    setTimeout(() => document.getElementById('node-text-input').focus(), 80);
  }

  confirmNodeText() {
    const n = this.nodes.find(x => x.id === this.editingId);
    if (!n) { this.cancelNodeText(); return; }
    this.snapshot();
    n.text       = document.getElementById('node-text-input').value;
    n.fontSize   = parseInt(document.getElementById('font-size-slider').value);
    n.color = this.selectedTextColor;
    n.bg    = this.selectedBgColor;
    this.cancelNodeText();
    const old = document.getElementById('node-' + n.id);
    if (old) { old.replaceWith(this.makeNodeEl(n)); }
    this.drawLines();
  }

  cancelNodeText() {
    document.getElementById('text-modal').classList.remove('open');
    this.editingId = null;
  }

  setDir(d) {
    document.getElementById('dir-tate').classList.toggle('active', d === 'tate');
    document.getElementById('dir-yoko').classList.toggle('active', d === 'yoko');

    const ta = document.getElementById('node-text-input');
    if (d === 'tate') {
      ta.style.writingMode = 'vertical-rl';
      ta.style.height = '180px';
    } else {
      ta.style.writingMode = 'horizontal-tb';
      ta.style.height = '120px';
    }

    const n = this.nodes.find(x => x.id === this.editingId);
    if (n) n.dir = d;
  }

  setWeight(w) {
    document.getElementById('weight-normal').classList.toggle('active', w === 'normal');
    document.getElementById('weight-bold').classList.toggle('active', w === 'bold');
    const n = this.nodes.find(x => x.id === this.editingId);
    if (n) n.fontWeight = w;
  }

  // ============================================================
  // PALETTE MANAGER
  // ============================================================
  renderPalettes() {
    const tDiv = document.getElementById('text-color-palette');
    const bDiv = document.getElementById('bg-color-palette');

    tDiv.innerHTML = USER_SETTINGS.PALETTE_TEXT_COLORS.map(c =>
      `<button class="palette-btn" style="background:${c}" onclick="selectPaletteColor('text','${c}')"></button>`
    ).join('');

    bDiv.innerHTML = USER_SETTINGS.PALETTE_BG_COLORS.map(c =>
      `<button class="palette-btn" style="background:${c}" onclick="selectPaletteColor('bg','${c}')"></button>`
    ).join('');
  }

  selectPaletteColor(type, color) {
    if (type === 'text') {
      this.selectedTextColor = color;
      document.querySelectorAll('#text-color-palette .palette-btn').forEach((btn, i) => {
        btn.classList.toggle('active', USER_SETTINGS.PALETTE_TEXT_COLORS[i] === color);
      });
    } else {
      this.selectedBgColor = color;
      document.querySelectorAll('#bg-color-palette .palette-btn').forEach((btn, i) => {
        btn.classList.toggle('active', USER_SETTINGS.PALETTE_BG_COLORS[i] === color);
      });
    }
  }
}

// ============================================================
// DOM INITIALIZATION & GLOBAL BINDING
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  const app = new ThinkingToolApp();

  window.undo = () => app.undo();
  window.redo = () => app.redo();
  window.manualSave = () => app.manualSave();
  window.changeZoom = (d) => app.changeZoom(d);
  window.resetZoom = () => app.resetZoom();
  window.openToolSelect = () => app.openToolSelect();
  window.closeToolSelect = () => app.closeToolSelect();
  window.openToolSelectFromEditor = () => app.openToolSelectFromEditor();
  window.createNew = (tool) => app.createNew(tool);
  window.loadProject = (id) => app.loadProject(id);
  window.deleteProject = (id) => app.deleteProject(id);
  window.closeEditor = () => app.closeEditor();
  window.confirmNodeText = () => app.confirmNodeText();
  window.cancelNodeText = () => app.cancelNodeText();
  window.setDir = (d) => app.setDir(d);
  window.setWeight = (w) => app.setWeight(w);
  window.selectPaletteColor = (type, color) => app.selectPaletteColor(type, color);
  window.scheduleAutoSave = () => app.scheduleAutoSave();
});
</script>
